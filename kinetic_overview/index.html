<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Data &mdash; Platform Overview</title>
<style>
:root {
  --blue: #242F4D;
  --blue-light: #2d3a5c;
  --blue-dark: #1a2240;
  --orange: #F36C24;
  --orange-light: #ff8a4c;
  --green: #27ae60;
  --red: #e74c3c;
  --yellow: #f39c12;
  --gray: #6b7a99;
  --light: #f0f2f7;
  --white: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c9b;
  --slide-max: 960px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--light); color: var(--text); overflow: hidden; height: 100vh; }

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 280px; min-width: 280px; background: var(--blue); color: white;
  display: flex; flex-direction: column; transition: margin-left .3s;
  z-index: 10; overflow-y: auto;
}
.sidebar.collapsed { margin-left: -280px; }
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-header h2 { font-size: 15px; font-weight: 600; letter-spacing: .5px; }
.sidebar-header .subtitle { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 4px; }

.module-list { flex: 1; padding: 8px 0; }
.module-item {
  padding: 10px 20px; cursor: pointer; font-size: 13px;
  border-left: 3px solid transparent; transition: all .2s;
  display: flex; align-items: flex-start; gap: 10px;
}
.module-item:hover { background: rgba(255,255,255,.06); }
.module-item.active { background: rgba(255,255,255,.1); border-left-color: var(--orange); }
.module-item .mod-num {
  background: rgba(255,255,255,.15); border-radius: 4px; min-width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
}
.module-item.active .mod-num { background: var(--orange); }
.module-item .mod-info { flex: 1; }
.module-item .mod-title { font-weight: 500; line-height: 1.3; }

.sidebar-footer {
  padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1);
  font-size: 11px; color: rgba(255,255,255,.4);
}

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar */
.topbar {
  height: 48px; background: white; border-bottom: 1px solid #e0e4eb;
  display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
}
.btn-toggle {
  background: none; border: 1px solid #d0d5de; border-radius: 6px; padding: 6px 10px;
  cursor: pointer; font-size: 16px; color: var(--gray);
}
.btn-toggle:hover { background: var(--light); }
.progress-wrap { flex: 1; display: flex; align-items: center; gap: 12px; }
.progress-bar { flex: 1; height: 4px; background: #e0e4eb; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--orange); border-radius: 2px; transition: width .4s; }
.progress-text { font-size: 12px; color: var(--gray); min-width: 60px; text-align: right; }
.nav-btns { display: flex; gap: 6px; }
.nav-btn {
  background: white; border: 1px solid #d0d5de; border-radius: 6px; padding: 6px 14px;
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text); transition: all .15s;
}
.nav-btn:hover { background: var(--light); border-color: var(--orange); color: var(--orange); }
.nav-btn:disabled { opacity: .3; cursor: default; }
.nav-btn:disabled:hover { background: white; border-color: #d0d5de; color: var(--text); }

/* Slide area */
.slide-area {
  flex: 1; overflow-y: auto; display: flex; justify-content: center;
  padding: 40px 40px 60px;
}
.slide {
  width: 100%; max-width: var(--slide-max); animation: fadeIn .35s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* Slide content */
.slide h1 { font-size: 36px; font-weight: 700; color: var(--blue); margin-bottom: 8px; line-height: 1.2; }
.slide .slide-subtitle { font-size: 18px; color: var(--gray); margin-bottom: 32px; font-weight: 400; }
.slide h2 { font-size: 24px; font-weight: 600; color: var(--blue); margin: 32px 0 16px; }
.slide h3 { font-size: 18px; font-weight: 600; color: var(--blue-light); margin: 24px 0 12px; }
.slide p { font-size: 16px; line-height: 1.7; margin-bottom: 16px; color: var(--text); }
.slide ul, .slide ol { margin: 0 0 20px 24px; }
.slide li { font-size: 16px; line-height: 1.7; margin-bottom: 8px; }
.slide li strong { color: var(--blue); }
.slide .highlight { color: var(--orange); font-weight: 600; }

/* Title slide */
.title-slide { text-align: center; padding-top: 60px; }
.title-slide h1 { font-size: 44px; margin-bottom: 12px; }
.title-slide .slide-subtitle { font-size: 22px; margin-bottom: 40px; }
.title-badge {
  display: inline-block; background: var(--orange); color: white; padding: 8px 24px;
  border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 32px;
}

/* Metric cards */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 24px 0; }
.metric {
  background: white; border-radius: 12px; padding: 24px; text-align: center;
  border: 1px solid #e0e4eb; box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.metric .val { font-size: 36px; font-weight: 700; color: var(--blue); }
.metric .val.orange { color: var(--orange); }
.metric .val.green { color: var(--green); }
.metric .label { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }

/* Comparison */
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 24px 0; }
.compare-col { background: white; border-radius: 12px; padding: 24px; border: 1px solid #e0e4eb; }
.compare-col.old { border-top: 3px solid var(--red); }
.compare-col.new { border-top: 3px solid var(--green); }
.compare-col h3 { margin-top: 0; font-size: 16px; }
.compare-col.old h3 { color: var(--red); }
.compare-col.new h3 { color: var(--green); }
.compare-col li { font-size: 14px; }

/* Callout boxes */
.callout {
  border-radius: 10px; padding: 20px 24px; margin: 20px 0;
  display: flex; gap: 14px; align-items: flex-start;
}
.callout-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.callout p { margin: 0; font-size: 15px; }
.callout.insight { background: #eef2ff; border-left: 4px solid #6366f1; }
.callout.warning { background: #fff7ed; border-left: 4px solid var(--orange); }
.callout.success { background: #f0fdf4; border-left: 4px solid var(--green); }

/* Architecture diagram */
.arch-diagram {
  display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 24px 0;
}
.arch-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
.arch-box {
  background: white; border: 2px solid var(--blue); border-radius: 10px;
  padding: 14px 24px; text-align: center; font-size: 13px; font-weight: 600;
  color: var(--blue); min-width: 140px;
}
.arch-box.highlight { background: var(--orange); border-color: var(--orange); color: white; }
.arch-box.secondary { border-color: var(--gray); color: var(--gray); border-style: dashed; }
.arch-box.green { border-color: var(--green); color: var(--green); }
.arch-arrow { color: var(--gray); font-size: 20px; }

/* Pill tags */
.pills { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
.pill {
  background: #eef2ff; color: #4338ca; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
}
.pill.orange { background: #fff7ed; color: #c2410c; }
.pill.green { background: #f0fdf4; color: #15803d; }
.pill.blue { background: #eff6ff; color: #1d4ed8; }

/* Section divider */
.section-divider {
  text-align: center; padding: 80px 0 40px;
}
.section-divider .mod-badge {
  background: var(--orange); color: white; display: inline-block;
  padding: 6px 16px; border-radius: 16px; font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px;
}
.section-divider h1 { font-size: 40px; margin-bottom: 12px; }
.section-divider p { font-size: 18px; color: var(--gray); max-width: 600px; margin: 0 auto; }

/* Case study cards */
.case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
.case-card {
  background: white; border-radius: 12px; padding: 20px;
  border: 1px solid #e0e4eb; box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.case-card .industry { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--orange); font-weight: 700; margin-bottom: 6px; }
.case-card h3 { margin: 0 0 8px; font-size: 16px; color: var(--blue); }
.case-card p { font-size: 13px; color: var(--gray); margin: 0; line-height: 1.5; }

/* Timeline */
.timeline { margin: 24px 0; }
.timeline-item {
  display: flex; gap: 16px; padding: 16px 0;
  border-bottom: 1px solid #e0e4eb;
}
.timeline-item:last-child { border-bottom: none; }
.timeline-year { min-width: 60px; font-size: 14px; font-weight: 700; color: var(--orange); padding-top: 2px; }
.timeline-content { font-size: 15px; line-height: 1.6; }
.timeline-content strong { color: var(--blue); }

/* Feature grid */
.feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
.feature-card {
  background: white; border-radius: 12px; padding: 20px;
  border: 1px solid #e0e4eb; box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.feature-card .feat-icon { font-size: 28px; margin-bottom: 8px; }
.feature-card h3 { margin: 0 0 8px; font-size: 15px; color: var(--blue); }
.feature-card p { font-size: 13px; color: var(--gray); margin: 0; line-height: 1.5; }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { position: fixed; left: 0; top: 0; height: 100vh; }
  .sidebar.collapsed { margin-left: -280px; }
  .slide-area { padding: 24px 20px 40px; }
  .compare { grid-template-columns: 1fr; }
  .case-grid { grid-template-columns: 1fr; }
  .feature-grid { grid-template-columns: 1fr; }
  .slide h1 { font-size: 28px; }
  .title-slide h1 { font-size: 32px; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
}

/* Keyboard hint */
.key-hint {
  position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,.7);
  color: white; padding: 6px 14px; border-radius: 8px; font-size: 11px;
  opacity: .5; pointer-events: none;
}
.key-hint kbd {
  background: rgba(255,255,255,.2); padding: 2px 6px; border-radius: 3px;
  font-family: inherit; margin: 0 2px;
}

@media print {
  .sidebar, .topbar, .nav-btns, .key-hint, .btn-toggle { display: none !important; }
  .slide-area { padding: 20px; overflow: visible; }
  .slide { page-break-after: always; max-width: 100%; }
}
</style>
</head>

// ── Engine ──────────────────────────────────────────────────────
let currentSlide = 0;
const allSlides = [];
const moduleStarts = [];

MODULES.forEach((mod, mi) => {
  moduleStarts.push(allSlides.length);
  mod.slides.forEach(s => {
    allSlides.push({ ...s, moduleIndex: mi });
  });
});

function renderModuleList() {
  const list = document.getElementById('moduleList');
  list.innerHTML = MODULES.map((mod, i) => `
    <div class="module-item ${i === 0 ? 'active' : ''}" data-mod="${i}" onclick="goToModule(${i})">
      <div class="mod-num">${i === 0 ? '&#9733;' : i}</div>
      <div class="mod-info">
        <div class="mod-title">${mod.title}</div>
      </div>
    </div>
  `).join('');
}

function renderSlide() {
  const slide = allSlides[currentSlide];
  document.getElementById('slideArea').innerHTML = `<div class="slide">${slide.html}</div>`;

  const pct = ((currentSlide + 1) / allSlides.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentSlide + 1} / ${allSlides.length}`;

  document.getElementById('btnPrev').disabled = currentSlide === 0;
  document.getElementById('btnNext').disabled = currentSlide === allSlides.length - 1;

  document.querySelectorAll('.module-item').forEach(el => {
    const mi = parseInt(el.dataset.mod);
    el.classList.toggle('active', mi === slide.moduleIndex);
  });

  document.getElementById('slideArea').scrollTop = 0;
}

function nextSlide() { if (currentSlide < allSlides.length - 1) { currentSlide++; renderSlide(); } }
function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlide(); } }
function goToModule(mi) { currentSlide = moduleStarts[mi]; renderSlide(); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  if (e.key === 's' || e.key === 'S') { toggleSidebar(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 60) { diff > 0 ? prevSlide() : nextSlide(); }
});

renderModuleList();
renderSlide();
</script>
