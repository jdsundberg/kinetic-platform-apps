<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Platform</title>
<style>
:root {
  --blue: #242F4D; --blue-light: #2E3B5E; --orange: #F36C24; --orange-light: #FF8A4C;
  --green: #34A853; --red: #EA4335; --yellow: #FBBC04; --gray: #5F6368;
  --light: #F8F9FA; --border: #E8EAED; --bg: #F1F3F4; --white: #fff;
  --shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.15);
  --purple: #7B1FA2; --teal: #00695C; --indigo: #283593; --deep-orange: #BF360C;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #202124; font-size: 14px; }
button { cursor: pointer; font-family: inherit; }
a { text-decoration: none; color: inherit; }

/* Login */
#login-screen { align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
#login-screen, #app { display:none; }
.login-box { background: var(--white); border-radius:16px; padding:40px; width:400px; box-shadow: var(--shadow-lg); }
.login-box h1 { color: var(--blue); font-size:24px; margin-bottom:4px; }
.login-box .sub { color: var(--gray); font-size:13px; margin-bottom:24px; }
.login-box .orange-bar { width:40px; height:3px; background: var(--orange); border-radius:2px; margin-bottom:24px; }
.login-box label { display:block; font-size:12px; font-weight:600; color:var(--gray); text-transform:uppercase; margin-bottom:4px; letter-spacing:.3px; }
.login-box input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:16px; outline:none; font-size:14px; font-family:inherit; }
.login-box input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(243,108,36,.1); }
.login-box button { width:100%; padding:12px; background:var(--orange); color:white; border:none; border-radius:8px; font-weight:600; font-size:15px; transition: background .15s; }
.login-box button:hover { background:var(--orange-light); }
.login-box .error { color:var(--red); font-size:12px; margin-top:8px; display:none; }

/* App shell */
#app { display:none; }
.topbar { background:var(--blue); color:white; display:flex; align-items:center; padding:0 24px; height:56px; position:sticky; top:0; z-index:100; }
.topbar .logo { font-weight:700; font-size:18px; white-space:nowrap; }
.topbar .logo span { color:var(--orange); }
.topbar .spacer { flex:1; }
.user-menu { position:relative; }
.user-menu-btn { background:none; border:1px solid rgba(255,255,255,.25); color:white; padding:6px 12px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s; font-family:inherit; }
.user-menu-btn:hover { border-color:var(--orange); background:rgba(255,255,255,.08); }
.user-menu-btn svg { opacity:.7; transition:transform .2s; }
.user-menu.open .user-menu-btn svg { transform:rotate(180deg); }
.user-menu-drop { display:none; position:absolute; right:0; top:calc(100% + 6px); background:var(--white); border-radius:10px; box-shadow:var(--shadow-lg); min-width:160px; overflow:hidden; z-index:200; }
.user-menu.open .user-menu-drop { display:block; }
.user-menu-drop .um-header { padding:12px 16px; border-bottom:1px solid var(--border); }
.user-menu-drop .um-header .um-name { font-size:13px; font-weight:700; color:#202124; }
.user-menu-drop .um-header .um-sub { font-size:11px; color:var(--gray); margin-top:2px; }
.user-menu-drop .um-item { display:flex; align-items:center; gap:8px; padding:10px 16px; font-size:13px; color:#202124; cursor:pointer; transition:background .1s; border:none; background:none; width:100%; font-family:inherit; text-align:left; }
.user-menu-drop .um-item:hover { background:var(--bg); }
.user-menu-drop .um-item svg { width:16px; height:16px; opacity:.6; }
.user-menu-drop .um-divider { height:1px; background:var(--border); }

/* Main */
.main { padding:24px; max-width:1200px; margin:0 auto; }
.page-header { margin-bottom:24px; }
.page-header h2 { font-size:22px; font-weight:700; color:var(--blue); margin-bottom:4px; }
.page-header .page-sub { font-size:13px; color:var(--gray); }

/* App grid */
.section-label { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--gray); font-weight:600; margin-bottom:12px; }
.app-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:32px; }

/* App card */
.app-card { background:white; border-radius:12px; border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; transition: transform .15s, box-shadow .15s; cursor:pointer; display:block; }
.app-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-lg); }
.app-card .accent { height:4px; }
.app-card .card-body { padding:20px; display:flex; gap:16px; align-items:flex-start; }
.app-card .icon-wrap { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.app-card .icon-wrap svg { width:24px; height:24px; }
.app-card .card-info { flex:1; min-width:0; }
.app-card .card-info h3 { font-size:15px; font-weight:700; color:var(--blue); margin-bottom:2px; }
.app-card .card-info .desc { font-size:12px; color:var(--gray); line-height:1.4; }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--blue); color:white; padding:12px 24px; border-radius:8px; font-size:13px; font-weight:600; box-shadow:var(--shadow-lg); transition:transform .3s; z-index:300; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* Kapp Picker Modal */
.picker-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; }
.picker-overlay.open { display:flex; }
.picker-card { background:var(--white); border-radius:16px; width:480px; max-height:70vh; box-shadow:var(--shadow-lg); overflow:hidden; display:flex; flex-direction:column; }
.picker-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; }
.picker-header h3 { font-size:17px; font-weight:700; color:var(--blue); flex:1; }
.picker-close { background:none; border:none; width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--gray); transition:background .1s; }
.picker-close:hover { background:var(--bg); }
.picker-body { overflow-y:auto; padding:8px 0; flex:1; }
.picker-loading { padding:32px; text-align:center; color:var(--gray); font-size:13px; }
.picker-row { display:flex; align-items:center; gap:12px; padding:12px 24px; cursor:pointer; transition:background .1s; }
.picker-row:hover { background:var(--bg); }
.picker-row .pr-name { font-size:14px; font-weight:600; color:#202124; }
.picker-row .pr-slug { font-size:12px; color:var(--gray); margin-left:6px; font-weight:400; }
.picker-row .pr-desc { font-size:12px; color:var(--gray); line-height:1.3; margin-top:2px; }
.picker-group { padding:10px 24px 4px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gray); border-top:1px solid var(--border); }
.picker-group:first-child { border-top:none; }

@media(max-width:600px) {
  .main { padding:16px; }
  .app-grid { grid-template-columns:1fr; }
  .picker-card { width:calc(100vw - 32px); }
}
</style>
</head>
<body>

<script>
// Synchronous: decide which screen to show before first paint
if (sessionStorage.getItem('base_session') || localStorage.getItem('base_session')) {
  document.write('<style id="boot-style">#app{display:block!important}#login-screen{display:none!important}</style>');
} else {
  document.write('<style id="boot-style">#login-screen{display:flex!important}#app{display:none!important}</style>');
}
</script>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Kinetic Platform</h1>
    <div class="sub">Unified Application Console</div>
    <div class="orange-bar"></div>
    <label>Server URL</label>
    <div style="position:relative">
      <input id="login-url" value="" placeholder="https://myspace.kinops.io" list="server-history" autocomplete="off">
      <datalist id="server-history"></datalist>
    </div>
    <label>Username</label>
    <input id="login-user" placeholder="username">
    <label>Password</label>
    <input id="login-pass" type="password" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Sign In</button>
    <div id="login-error" class="error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="logo">Kinetic <span>Platform</span></div>
    <div class="spacer"></div>
    <div class="user-menu" id="user-menu">
      <button class="user-menu-btn" onclick="toggleUserMenu()">
        <span id="user-display"></span>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="user-menu-drop">
        <div class="um-header">
          <div class="um-name" id="user-menu-name"></div>
          <div class="um-sub">Kinetic Platform</div>
        </div>
        <button class="um-item" onclick="doLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <h2>Application Launcher</h2>
      <div class="page-sub">Select an application to open</div>
    </div>

    <div class="section-label">Applications</div>
    <div id="app-grid" class="app-grid"></div>
    <div class="section-label" style="margin-top:24px">School Management</div>
    <div id="school-grid" class="app-grid"></div>
    <div class="section-label" style="margin-top:24px">Industry</div>
    <div id="industry-grid" class="app-grid"></div>
    <div class="section-label" style="margin-top:24px">Healthcare</div>
    <div id="healthcare-grid" class="app-grid"></div>
    <div class="section-label" style="margin-top:24px">Department of Defense</div>
    <div id="dod-grid" class="app-grid"></div>
    <div class="section-label" style="margin-top:24px">Miscellaneous</div>
    <div id="misc-grid" class="app-grid"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Kapp Picker Modal -->
<div class="picker-overlay" id="kapp-picker" onclick="if(event.target===this)closeKappPicker()">
  <div class="picker-card">
    <div class="picker-header">
      <h3 id="picker-title">Select a Kapp</h3>
      <button class="picker-close" onclick="closeKappPicker()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="picker-body" id="picker-body">
      <div class="picker-loading">Loading kapps...</div>
    </div>
  </div>
</div>

/* ── State ─────────────────────────────────────────────────────── */

let API = { url: '', auth: '', user: '', displayName: '' };

// Wrapper that adds X-Kinetic-Server header for per-tab proxy routing
function proxyFetch(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  if (API.url && typeof opts.headers === 'object' && !Array.isArray(opts.headers)) {
    if (!opts.headers['X-Kinetic-Server']) opts.headers['X-Kinetic-Server'] = API.url;
  }
  return fetch(url, opts);
}

/* ── User Menu ────────────────────────────────────────────────── */

function toggleUserMenu() {
  document.getElementById('user-menu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const m = document.getElementById('user-menu');
  if (m && !m.contains(e.target)) m.classList.remove('open');
});

function setUserDisplay(name, spaceSlug) {
  var label = spaceSlug ? name + ' · ' + spaceSlug : name;
  document.getElementById('user-display').textContent = label;
  document.getElementById('user-menu-name').textContent = label;
}

/* ── Server History ────────────────────────────────────────────── */

function getServerHistory() {
  try { return JSON.parse(localStorage.getItem('kinetic_servers') || '[]'); } catch { return []; }
}

function saveServerToHistory(url) {
  if (!url) return;
  let servers = getServerHistory().filter(s => s !== url);
  servers.unshift(url);
  if (servers.length > 10) servers = servers.slice(0, 10);
  localStorage.setItem('kinetic_servers', JSON.stringify(servers));
  populateServerHistory();
}

function populateServerHistory() {
  const dl = document.getElementById('server-history');
  if (!dl) return;
  dl.innerHTML = '';
  getServerHistory().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    dl.appendChild(opt);
  });
}

/* ── Login / Logout ────────────────────────────────────────────── */

async function doLogin() {
  let serverUrl = document.getElementById('login-url').value.trim().replace(/\/+$/, '');
  // Auto-add https:// if a hostname was entered without protocol
  if (serverUrl && !serverUrl.match(/^https?:\/\//)) serverUrl = 'https://' + serverUrl;
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';

  if (!user || !pass) {
    err.textContent = 'Username and password are required.';
    err.style.display = 'block';
    return;
  }

  try {
    // Set proxy target as fallback (also used by tabs that don't send header)
    if (serverUrl) {
      const tr = await fetch('/api/base/target', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: serverUrl })
      });
      if (!tr.ok) throw new Error('Failed to set server target');
    }

    API = { url: serverUrl, auth: btoa(user + ':' + pass), user: user, displayName: '' };

    // Build headers with per-tab server routing
    const proxyHeaders = { 'Authorization': 'Basic ' + API.auth };
    if (serverUrl) proxyHeaders['X-Kinetic-Server'] = serverUrl;

    const res = await fetch('/app/api/v1/me', { headers: proxyHeaders });
    if (!res.ok) throw new Error('Invalid credentials');
    const d = await res.json();
    API.displayName = d.displayName || d.user?.displayName || user;

    // Fetch space slug for display
    try {
      const sr = await fetch('/app/api/v1/space', { headers: proxyHeaders });
      if (sr.ok) { const sd = await sr.json(); API.spaceSlug = (sd.space || sd).slug || ''; }
    } catch(e2) {}

    // Store session in sessionStorage (per-tab) + localStorage (cross-tab for shift-click)
    sessionStorage.setItem('base_session', JSON.stringify(API));
    localStorage.setItem('base_session', JSON.stringify(API));
    saveServerToHistory(serverUrl);

    var bs = document.getElementById('boot-style'); if (bs) bs.remove();
    setUserDisplay(API.displayName, API.spaceSlug);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    renderGrid();
  } catch(e) {
    err.textContent = e.message.includes('Failed to fetch')
      ? 'Cannot reach server.'
      : 'Login failed: ' + e.message;
    err.style.display = 'block';
  }
}

function doLogout() {
  var bs = document.getElementById('boot-style'); if (bs) bs.remove();
  sessionStorage.removeItem('base_session');
  sessionStorage.removeItem('kinetic_session');
  sessionStorage.removeItem('atlas_session');
  localStorage.removeItem('base_session');
  API = { url: '', auth: '', user: '', displayName: '' };
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
  populateServerHistory();
}

async function restoreSession() {
  var saved = sessionStorage.getItem('base_session');
  // Fall back to localStorage for shift-click new tabs
  if (!saved) {
    saved = localStorage.getItem('base_session');
    if (saved) sessionStorage.setItem('base_session', saved);
  }
  if (!saved) return;
  try {
    API = JSON.parse(saved);
    // Fix stored URLs missing protocol
    if (API.url && !API.url.match(/^https?:\/\//)) API.url = 'https://' + API.url;

    // Restore proxy target as fallback
    if (API.url) {
      await fetch('/api/base/target', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: API.url })
      });
    }

    // Build headers with per-tab server routing
    const proxyHeaders = { 'Authorization': 'Basic ' + API.auth };
    if (API.url) proxyHeaders['X-Kinetic-Server'] = API.url;

    const res = await fetch('/app/api/v1/me', { headers: proxyHeaders });
    if (!res.ok) throw new Error('expired');
    const d = await res.json();
    API.displayName = d.displayName || d.user?.displayName || API.user;

    // Refresh space slug if missing
    if (!API.spaceSlug) {
      try {
        const sr = await fetch('/app/api/v1/space', { headers: proxyHeaders });
        if (sr.ok) { const sd = await sr.json(); API.spaceSlug = (sd.space || sd).slug || ''; sessionStorage.setItem('base_session', JSON.stringify(API)); }
      } catch(e2) {}
    }

    // Pre-fill URL field for reference
    if (API.url) document.getElementById('login-url').value = API.url;

    setUserDisplay(API.displayName, API.spaceSlug);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Keep localStorage in sync for future shift-click tabs
    localStorage.setItem('base_session', JSON.stringify(API));

    renderGrid();
  } catch(e) {
    var bs = document.getElementById('boot-style'); if (bs) bs.remove();
    sessionStorage.removeItem('base_session');
    localStorage.removeItem('base_session');
    API = { url: '', auth: '', user: '', displayName: '' };
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    populateServerHistory();
  }
}
populateServerHistory();
restoreSession();

/* ── Grid Rendering ───────────────────────────────────────────── */

function renderGrid() {
  const appApps = APPS.filter(a => !a.industry && !a.healthcare && !a.dod && !a.school && !a.misc);
  const schoolApps = APPS.filter(a => a.school);
  const industryApps = APPS.filter(a => a.industry);
  const healthcareApps = APPS.filter(a => a.healthcare);
  const dodApps = APPS.filter(a => a.dod);
  const miscApps = APPS.filter(a => a.misc);
  document.getElementById('app-grid').innerHTML = renderCards(appApps);
  document.getElementById('school-grid').innerHTML = renderCards(schoolApps);
  document.getElementById('industry-grid').innerHTML = renderCards(industryApps);
  document.getElementById('healthcare-grid').innerHTML = renderCards(healthcareApps);
  document.getElementById('dod-grid').innerHTML = renderCards(dodApps);
  document.getElementById('misc-grid').innerHTML = renderCards(miscApps);
}

function renderCards(apps) {
  return apps.map(app => {
    const tag = app.picker ? 'div' : 'a';
    const action = app.picker
      ? `onclick="openKappPicker('${app.slug}','${app.name}')"`
      : `href="/${app.slug}/"`;
    return `
    <${tag} class="app-card" ${action}>
      <div class="accent" style="background:${app.color}"></div>
      <div class="card-body">
        <div class="icon-wrap" style="background:${app.bg}">
          ${svgIcon(app.icon, app.color)}
        </div>
        <div class="card-info">
          <h3>${app.name}</h3>
          <div class="desc">${app.desc}</div>
        </div>
      </div>
    </${tag}>`;
  }).join('');
}

/* ── Kapp Picker ──────────────────────────────────────────────── */

let pickerAppSlug = '';

function openKappPicker(appSlug, appName) {
  pickerAppSlug = appSlug;
  document.getElementById('picker-title').textContent = appName + ' — Select Scope';
  document.getElementById('picker-body').innerHTML = '<div class="picker-loading">Loading kapps...</div>';
  document.getElementById('kapp-picker').classList.add('open');
  loadKappsForPicker();
}

function closeKappPicker() {
  document.getElementById('kapp-picker').classList.remove('open');
  pickerAppSlug = '';
}

async function loadKappsForPicker() {
  const body = document.getElementById('picker-body');
  try {
    const res = await proxyFetch('/app/api/v1/kapps', {
      headers: { 'Authorization': 'Basic ' + API.auth }
    });
    if (!res.ok) throw new Error('Failed to load kapps');
    const data = await res.json();
    const kapps = data.kapps || [];
    if (!kapps.length) {
      body.innerHTML = '<div class="picker-loading">No kapps found.</div>';
      return;
    }
    let html = '';
    // Add Space option for workflow apps
    if (pickerAppSlug === 'workflow-builder' || pickerAppSlug === 'workflow-debugger' || pickerAppSlug === 'test-runner') {
      html += `<div class="picker-row" onclick="window.location.href='/${pickerAppSlug}/?kapp=__space__'" style="border-bottom:1px solid var(--border)">
        <div>
          <div class="pr-name">Space (Global)</div>
          <div class="pr-desc">Space-level routines and workflows</div>
        </div>
      </div>`;
    }
    html += kapps.map(k => `
      <div class="picker-row" onclick="window.location.href='/${pickerAppSlug}/?kapp=${encodeURIComponent(k.slug)}'">
        <div>
          <div class="pr-name">${k.name}<span class="pr-slug">${k.slug}</span></div>
          ${k.description ? `<div class="pr-desc">${k.description}</div>` : ''}
        </div>
      </div>
    `).join('');
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = '<div class="picker-loading">Error loading kapps.</div>';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('kapp-picker').classList.contains('open')) {
    closeKappPicker();
  }
});

/* ── Toast ─────────────────────────────────────────────────────── */

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
