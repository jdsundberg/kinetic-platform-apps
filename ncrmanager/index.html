<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic MedQMS</title>
<style>
:root{--navy:#0B3D4F;--navy-l:#12586F;--blue:#1E7FB5;--blue-l:#3FA0D6;--teal:#0E8C86;--teal-l:#16B3AC;--gold:#E0A21A;--green:#1F9D6B;--green-d:#157A52;--red:#D14B3F;--amber:#E08A1E;--purple:#6E4FB0;--gray:#5C6670;--light:#F1F5F7;--border:#DEE6EA;--bg:#E8F1F4;--white:#fff;--shadow:0 1px 3px rgba(11,61,79,.10),0 1px 2px rgba(11,61,79,.06);--shadow-lg:0 14px 36px rgba(11,61,79,.22)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#142028;font-size:14px}
button{cursor:pointer;font-family:inherit;font-size:13px;border:none;border-radius:8px;padding:8px 16px;transition:background .15s,opacity .15s}
button:hover{opacity:.92}button:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:9px 12px;outline:none;transition:border-color .15s;background:var(--white);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,127,181,.14)}
textarea{resize:vertical}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--gray);border-bottom:2px solid var(--border);background:var(--light);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tr.clickable-row{cursor:pointer}tr.clickable-row:hover{background:#EAF4F8}
.empty{color:var(--gray);text-align:center;padding:26px;font-size:13px}
a.link{color:var(--blue);cursor:pointer;text-decoration:none;font-weight:600}a.link:hover{text-decoration:underline}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#06222E 0%,#0B3D4F 55%,#12586F 100%)}
#login-screen,#app{display:none}
.login-box{background:var(--white);border-radius:16px;padding:40px;width:420px;box-shadow:var(--shadow-lg)}
.login-box h1{color:var(--navy);font-size:25px;margin-bottom:4px;letter-spacing:-.5px}
.login-box h1 span{color:var(--teal)}
.login-box .sub{color:var(--gray);font-size:13px;margin-bottom:20px}
.login-box .accent-bar{width:40px;height:3px;background:var(--teal);border-radius:2px;margin-bottom:22px}
.login-box label{display:block;font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;margin-bottom:4px;letter-spacing:.3px}
.login-box input{margin-bottom:14px}
.login-box button{width:100%;padding:12px;background:var(--navy);color:white;font-weight:600;font-size:15px}
.login-box button:hover{background:var(--navy-l)}
.login-box .error{color:var(--red);font-size:12px;margin-top:8px;display:none}

.topbar{background:var(--navy);color:white;display:flex;align-items:center;padding:0 16px;height:54px;position:sticky;top:0;z-index:100}
.topbar .logo{font-weight:700;font-size:16px;white-space:nowrap;margin-right:18px;letter-spacing:-.2px}
.topbar .logo span{color:var(--teal-l)}
.topbar nav{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:thin}
.topbar nav button{background:transparent;color:rgba(255,255,255,.74);padding:7px 10px;font-size:12px;font-weight:500;border-radius:7px;white-space:nowrap}
.topbar nav button:hover{color:#fff;background:rgba(255,255,255,.08)}
.topbar nav button.active{background:var(--teal);color:#fff;font-weight:700}
.topbar .spacer{flex:1}
.persona{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.18);font-size:11px;padding:5px 8px;border-radius:7px;max-width:180px;width:auto}
.persona option{color:#142028}
.user-info{font-size:12px;color:rgba(255,255,255,.74);display:flex;align-items:center;gap:8px;white-space:nowrap;margin-left:10px}
.user-info strong{color:white}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.74);padding:4px 10px;border-radius:6px;font-size:11px}
.logout-btn:hover{border-color:var(--teal-l);color:white}

.console{display:none;padding:20px;max-width:1560px;margin:0 auto}
.console.active{display:block}
.page-title{font-size:21px;font-weight:700;color:var(--navy);margin-bottom:2px}
.page-sub{font-size:13px;color:var(--gray);margin-bottom:16px}
.card{background:white;border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
.card h3{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;margin-bottom:12px;letter-spacing:.4px}
.card h3 .hint{float:right;font-weight:600;color:var(--blue);text-transform:none;letter-spacing:0;font-size:11px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:16px}
.kpi{background:var(--white);border-radius:11px;padding:13px;box-shadow:var(--shadow);border-top:3px solid var(--gray);cursor:default}
.kpi.click{cursor:pointer}.kpi.click:hover{box-shadow:var(--shadow-lg)}
.kpi .val{font-size:22px;font-weight:700;margin:3px 0;color:var(--navy)}
.kpi .label{font-size:9px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.kpi .sub{font-size:11px;color:var(--gray)}
.kpi.gold .val{color:var(--gold)}.kpi.gold{border-top-color:var(--gold)}
.kpi.green .val{color:var(--green)}.kpi.green{border-top-color:var(--green)}
.kpi.red .val{color:var(--red)}.kpi.red{border-top-color:var(--red)}
.kpi.amber .val{color:var(--amber)}.kpi.amber{border-top-color:var(--amber)}
.kpi.purple .val{color:var(--purple)}.kpi.purple{border-top-color:var(--purple)}
.kpi.blue .val{color:var(--blue)}.kpi.blue{border-top-color:var(--blue)}
.kpi.teal .val{color:var(--teal)}.kpi.teal{border-top-color:var(--teal)}
.kpi.navy .val{color:var(--navy)}.kpi.navy{border-top-color:var(--navy)}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green,.badge-closed,.badge-approved,.badge-effective,.badge-completed,.badge-active,.badge-accepted,.badge-controlled,.badge-passed,.badge-conforming,.badge-in-service,.badge-signed,.badge-yes,.badge-low{background:#E1F2EA;color:#157A52}
.b-amber,.badge-open,.badge-triage,.badge-investigation,.badge-in-progress,.badge-in-review,.badge-pending,.badge-pending-approval,.badge-assigned,.badge-draft,.badge-scheduled,.badge-reporting,.badge-supplier-response,.badge-review,.badge-impact-assessment,.badge-approval,.badge-implementation,.badge-verification,.badge-effectiveness,.badge-reportability-review,.badge-pending-closure,.badge-action-planning,.badge-containment,.badge-mrb-review,.badge-disposition,.badge-monitoring,.badge-conditional,.badge-medium,.badge-issued{background:#FBF1DC;color:#9A6710}
.b-red,.badge-overdue,.badge-rejected,.badge-escalated,.badge-failed,.badge-reopened,.badge-out-of-service,.badge-disqualified,.badge-critical,.badge-major,.badge-high,.badge-findings-major{background:#FBE6E4;color:#A6362D}
.badge-not-required,.badge-obsolete,.badge-inactive,.badge-none,.badge-no,.badge-minor,.badge-observation,.badge-ofi{background:var(--light);color:var(--gray)}
.pill{display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;background:var(--light);color:var(--gray);text-transform:uppercase;letter-spacing:.3px}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:11px 14px;background:var(--white);border-radius:12px;box-shadow:var(--shadow)}
.toolbar input[type="text"]{flex:1;min-width:200px;width:auto}
.toolbar select{min-width:130px;width:auto}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 2px}
.pagination .page-info{color:var(--gray);font-size:13px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--gray);padding:6px 14px;border-radius:8px}
.btn-outline:hover{background:var(--light)}
.btn-primary{background:var(--navy);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700}
.btn-danger{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-small{padding:5px 11px;font-size:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:1000px){.grid-2,.grid-3{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
.subtabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.subtab{background:var(--light);border:1px solid var(--border);color:var(--gray);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600}
.subtab.active{background:var(--navy);color:white;border-color:var(--navy)}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12px}
.bar-row .bl{min-width:150px;max-width:150px;text-align:right;color:var(--gray);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .bt{flex:1;background:var(--light);border-radius:5px;height:18px;overflow:hidden}
.bar-row .bf{height:100%;border-radius:5px;background:var(--navy);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;color:#fff;font-size:10px;font-weight:700}
.bar-row .bv{min-width:42px;font-weight:700;color:var(--navy);text-align:right}
svg.viz{width:100%;height:auto;display:block;font-family:inherit}

/* slide-over drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(11,30,40,.42);z-index:200;display:none}
.drawer-overlay.show{display:block}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(820px,96vw);background:var(--bg);box-shadow:var(--shadow-lg);z-index:201;transform:translateX(100%);transition:transform .22s ease;overflow-y:auto}
.drawer.show{transform:translateX(0)}
.drawer-head{position:sticky;top:0;background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:flex-start;gap:12px;z-index:5}
.drawer-head .dh-id{font-size:11px;color:var(--teal-l);font-weight:700;letter-spacing:.4px}
.drawer-head h2{font-size:18px;margin:2px 0 4px;line-height:1.25}
.drawer-head .dh-x{margin-left:auto;background:rgba(255,255,255,.12);color:#fff;border-radius:8px;padding:6px 11px;font-size:16px;line-height:1}
.drawer-body{padding:18px 20px}
.dsec{background:#fff;border:1px solid var(--border);border-radius:11px;padding:15px;margin-bottom:14px}
.dsec h4{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--gray);margin-bottom:11px;font-weight:700}
.fieldgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
.fieldgrid.one{grid-template-columns:1fr}
.fld{font-size:13px}.fld .fl{font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--gray);font-weight:600;margin-bottom:1px}
.fld .fv{font-weight:500;color:#142028;word-break:break-word}
.rel-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:9px;margin-bottom:7px;cursor:pointer;background:#fff}
.rel-item:hover{border-color:var(--blue);background:#F4FAFD}
.rel-item .rt{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#fff;background:var(--teal);padding:2px 7px;border-radius:5px;white-space:nowrap}
.rel-item .ri-id{font-weight:700;color:var(--navy);font-size:12px}
.rel-item .ri-t{flex:1;color:#3a4750;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rel-item .ri-rel{font-size:10px;color:var(--gray);font-style:italic}
.tl{position:relative;padding-left:18px}
.tl::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:13px}
.tl-item::before{content:'';position:absolute;left:-16px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff;box-shadow:0 0 0 1px var(--border)}
.tl-item .tl-h{font-size:12px;font-weight:700;color:var(--navy)}
.tl-item .tl-m{font-size:11.5px;color:#445;margin-top:1px}
.tl-item .tl-d{font-size:10.5px;color:var(--gray);margin-top:1px}
.sig{border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;padding:9px 11px;margin-bottom:8px;background:#FBFDFC}
.sig .sg-m{font-weight:700;color:var(--green-d);font-size:12.5px}
.sig .sg-s{font-size:11.5px;color:#445;margin-top:1px}
.sig .sg-h{font-size:10px;color:var(--gray);font-family:ui-monospace,monospace;margin-top:3px}

/* graph */
.graph-wrap{overflow:auto;border:1px solid var(--border);border-radius:9px;background:#FBFDFE}
.gnode{cursor:pointer}.gnode:hover .gn-box{filter:brightness(1.05)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(11,30,40,.5);z-index:300;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;width:min(640px,96vw);box-shadow:var(--shadow-lg)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-head h3{font-size:16px;color:var(--navy)}
.modal-head .mx{margin-left:auto;background:var(--light);border-radius:8px;padding:5px 10px}
.modal-body{padding:18px 20px;max-height:64vh;overflow-y:auto}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end}
.mfield{margin-bottom:12px}.mfield label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
@media(max-width:560px){.mgrid{grid-template-columns:1fr}.fieldgrid{grid-template-columns:1fr}}
.note{background:#FCF6E5;border:1px solid #F0DFA8;border-radius:8px;padding:9px 12px;font-size:11.5px;color:#8A6410;margin-bottom:12px}
.note.part11{background:#EAF4F8;border-color:#BcdDEA;color:#0B3D4F}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:9px;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s;z-index:500}
#toast.show{opacity:1}
.spin{text-align:center;padding:40px;color:var(--gray)}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--light);color:var(--gray);margin-right:5px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Kinetic <span>MedQMS</span></h1>
    <p class="sub">Medical-Device Manufacturing Quality Management</p>
    <div class="accent-bar"></div>
    <label>Server URL</label><input type="text" id="login-url" placeholder="https://ai-labs.kinopsdev.io">
    <label>Username</label><input type="text" id="login-user" placeholder="username">
    <label>Password</label><input type="password" id="login-pass" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Sign In</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="logo">Kinetic <span>MedQMS</span></div>
    <nav id="main-nav"></nav>
    <div class="spacer"></div>
    <select class="persona" id="persona" onchange="setPersona()" title="Role / view-as persona"></select>
    <div class="user-info"><strong id="user-display"></strong><button class="logout-btn" onclick="doLogout()">Logout</button></div>
  </div>

  <div class="console active" id="tab-home"></div>
  <div class="console" id="tab-analytics"></div>
  <div class="console" id="tab-module">
    <div id="module-subtabs" class="subtabs"></div>
    <div id="module-host"></div>
  </div>
  <div class="console" id="tab-admin"></div>
</div>

<!-- drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div id="drawer-content"></div></div>

<!-- modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="modal-content"></div></div>
</div>
<div id="toast"></div>

<script>
const KAPP='ncrmanager';
let API={url:'',auth:'',user:'',displayName:'',spaceSlug:''};
let PERSONA='';
const PERSONAS=['Maria Okafor','James Reyes','Aisha Kim','Chen Kim','David Schmidt','Priya Patel','Sofia Haddad','Grace Lindqvist','Ivan Petrov','Leila Cohen','Sean Murphy'];
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function v(sub,f){return sub.values?.[f]||''}
function n_(x){const f=parseFloat(String(x).replace(/[^0-9.\-]/g,''));return isNaN(f)?0:f}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function badgeClass(val){if(!val)return'badge-none';return'badge-'+String(val).toLowerCase().replace(/\s*[\/(]\s*/g,'-').replace(/\)/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')}
function badge(val){return`<span class="badge ${badgeClass(val)}">${esc(val||'—')}</span>`}
const TODAY=new Date('2026-06-27T00:00:00Z').getTime();
function overdue(due){if(!due)return false;const t=new Date(due).getTime();return!isNaN(t)&&t<TODAY}
function daysOver(due){const t=new Date(due).getTime();return isNaN(t)?0:Math.round((TODAY-t)/86400000)}

async function api(path,opts={}){const res=await fetch(`${API.url}/app/api/v1${path}`,{...opts,headers:{'Authorization':'Basic '+API.auth,'Content-Type':'application/json',...opts.headers}});if(!res.ok)throw new Error(`${res.status} ${res.statusText}`);return res.json()}
async function sapi(path,opts={}){const res=await fetch(path,{...opts,headers:{'Authorization':'Basic '+API.auth,'Content-Type':'application/json',...(opts.headers||{})}});if(!res.ok){let m=res.status;try{const j=await res.json();m=j.error?.message||m}catch(e){}throw new Error(m)}return res.json()}

/* ===================== MODULE CONFIG ===================== */
const SEL={ // common select option sets
  yn:['Yes','No'],
  severity:['Low','Medium','High','Critical'],
  riskLevel:['Low','Medium','High'],
  priority:['Low','Medium','High','Critical'],
};
const MODULES={
  'quality-events':{label:'Quality Events',idField:'Event ID',title:'Title',
    cols:[['Event ID','ID'],['Title','Title'],['Type','Type','badge'],['Severity','Severity','badge'],['Site','Site'],['Owner','Owner'],['Due Date','Due','date'],['Status','Status','badge']],
    filters:[['Status',['Open','Triage','Investigation','Pending Approval','Closed','Rejected']],['Type',['Deviation','Nonconformance','Complaint','Audit Finding','Supplier Issue','Safety Signal','Observation','Service Finding']],['Severity',SEL.severity]],
    search:['Event ID','Title','Owner','Product'],
    edit:[['Title','text',1],['Type','select',['Deviation','Nonconformance','Complaint','Audit Finding','Supplier Issue','Safety Signal','Observation','Service Finding']],['Source','text'],['Severity','select',SEL.severity],['Risk Level','select',SEL.riskLevel],['Site','text'],['Product','text'],['Lot','text'],['Supplier','text'],['Owner','select',PERSONAS],['Status','select',['Open','Triage','Investigation','Pending Approval','Closed','Rejected']],['Priority','select',SEL.priority],['Confidential','select',SEL.yn],['Due Date','date'],['Description','textarea']]},
  'nonconformances':{label:'Nonconformances',idField:'NC ID',title:'Title',
    cols:[['NC ID','ID'],['Title','Title'],['Product','Product'],['Site','Site'],['Disposition','Disposition','badge'],['Owner','Owner'],['Due Date','Due','date'],['Status','Status','badge']],
    filters:[['Status',['Open','Containment','MRB Review','Disposition','Closed','Reopened']],['Disposition',['Use As Is','Rework','Scrap','Return to Supplier','Concession']]],
    search:['NC ID','Title','Product','Lot'],
    edit:[['Title','text'],['Source Event','text'],['Product','text'],['Lot','text'],['Serial','text'],['Qty Affected','text'],['Site','text'],['Severity','select',SEL.severity],['Containment','text'],['Segregation','text'],['Disposition','select',['','Use As Is','Rework','Scrap','Return to Supplier','Concession']],['MRB Decision','text'],['MRB Date','date'],['Owner','select',PERSONAS],['Status','select',['Open','Containment','MRB Review','Disposition','Closed','Reopened']],['Due Date','date'],['Linked CAPA','text'],['Description','textarea']]},
  'capas':{label:'CAPAs',idField:'CAPA ID',title:'Title',
    cols:[['CAPA ID','ID'],['Title','Title'],['Type','Type','badge'],['Risk Level','Risk','badge'],['Site','Site'],['Owner','Owner'],['Due Date','Due','date'],['Effectiveness Result','Effective','badge'],['Status','Status','badge']],

async function doLogin(){const url=document.getElementById('login-url').value.replace(/\/+$/,''),user=document.getElementById('login-user').value,pass=document.getElementById('login-pass').value;const errEl=document.getElementById('login-error');errEl.style.display='none';try{API.url=url;API.auth=btoa(user+':'+pass);const me=await api('/me');API.user=me.username;API.displayName=me.displayName||me.username;try{const sp=await api('/space');API.spaceSlug=sp.space?.slug||''}catch(e){}enterApp()}catch(e){errEl.textContent='Login failed: '+e.message;errEl.style.display='block'}}
function enterApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('user-display').textContent=API.displayName+(API.spaceSlug?' · '+API.spaceSlug:'');buildNav();buildPersona();requestAnimationFrame(()=>switchTab('home'))}
function doLogout(){API={url:'',auth:'',user:'',displayName:'',spaceSlug:''};document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('login-pass').value='';sessionStorage.removeItem('kinetic_session')}
(function(){const sess=sessionStorage.getItem('kinetic_session');if(sess){try{const s=JSON.parse(sess);API.url=s.url||'';API.auth=s.auth;API.user=s.user||'';API.displayName=s.displayName||s.user||'';API.spaceSlug=s.spaceSlug||'';enterApp();return}catch(e){}}document.getElementById('login-screen').style.display='flex'})();

function buildNav(){document.getElementById('main-nav').innerHTML=GROUPS.map(g=>`<button data-g="${g.key}" onclick="navClick('${g.key}')">${esc(g.label)}</button>`).join('')}
function buildPersona(){const sel=document.getElementById('persona');PERSONA=API.displayName;sel.innerHTML=`<option value="${esc(API.displayName)}">View as: me (${esc(API.displayName)})</option>`+PERSONAS.map(p=>`<option value="${esc(p)}">View as: ${esc(p)}</option>`).join('')}
function setPersona(){PERSONA=document.getElementById('persona').value;if(activeTab==='home')loadHome()}
let activeTab='home',activeGroup=null;
function navClick(gk){const g=GROUPS.find(x=>x.key===gk);document.querySelectorAll('#main-nav button').forEach(b=>b.classList.toggle('active',b.dataset.g===gk));if(gk==='home')switchTab('home');else if(gk==='analytics')switchTab('analytics');else if(gk==='admin')switchTab('admin');else openGroup(g)}
function switchTab(t){activeTab=t;document.querySelectorAll('.console').forEach(c=>c.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');const map={home:'home',analytics:'analytics',admin:'admin'};document.querySelectorAll('#main-nav button').forEach(b=>b.classList.toggle('active',b.dataset.g===map[t]));if(t==='home')loadHome();else if(t==='analytics')loadAnalytics();else if(t==='admin')loadAdmin()}

function openGroup(g){activeTab='module';document.querySelectorAll('.console').forEach(c=>c.classList.remove('active'));document.getElementById('tab-module').classList.add('active');
  const st=document.getElementById('module-subtabs');
  if(g.mods.length>1){st.style.display='flex';st.innerHTML=g.mods.map((m,i)=>`<button class="subtab${i===0?' active':''}" onclick="subSel('${g.key}','${m}',this)">${esc(MODULES[m].label)}</button>`).join('')}
  else{st.style.display='none';st.innerHTML=''}
  openModule(g.mods[0]);}
function subSel(gk,m,btn){document.querySelectorAll('#module-subtabs .subtab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');openModule(m)}
function openModule(m){activeModule=m;const cfg=MODULES[m];
  const host=document.getElementById('module-host');
  host.innerHTML=`<div class="page-title">${esc(cfg.label)}</div><div class="page-sub">${cfg.count||''}</div>
    <div class="toolbar">
      <input type="text" id="m-search" placeholder="Search ${esc(cfg.label.toLowerCase())}…" oninput="debouncedFetch()">
      ${cfg.filters.map(f=>`<select id="m-f-${esc(f[0])}" onchange="loadModuleTable()"><option value="">All ${esc(f[0])}</option>${f[1].map(o=>`<option>${esc(o)}</option>`).join('')}</select>`).join('')}
      <button class="btn-teal btn-small" onclick="openEdit('${m}',null)">+ Add New</button>
    </div>
    <div class="card" style="padding:0;overflow:auto"><table><thead><tr>${cfg.cols.map(c=>`<th class="${c[2]==='num'?'num':''}">${esc(c[1])}</th>`).join('')}</tr></thead><tbody id="m-body"><tr><td colspan="${cfg.cols.length}" class="spin">Loading…</td></tr></tbody></table></div>
    <div class="pagination"><button class="btn-outline" id="m-prev" onclick="pageModule(-1)" disabled>Prev</button><span class="page-info" id="m-info">Page 1</span><button class="btn-outline" id="m-next" onclick="pageModule(1)" disabled>Next</button></div>`;
  PG={page:1,keys:{1:null},hasNext:false};loadModuleTable();}
let PG={page:1,keys:{1:null},hasNext:false},_deb=null;
function debouncedFetch(){clearTimeout(_deb);_deb=setTimeout(()=>{PG={page:1,keys:{1:null},hasNext:false};fetchModule()},280)}
function loadModuleTable(){PG={page:1,keys:{1:null},hasNext:false};fetchModule()}
function pageModule(d){if(d>0&&PG.hasNext)PG.page++;else if(d<0&&PG.page>1)PG.page--;else return;fetchModule()}
async function fetchModule(){const m=activeModule,cfg=MODULES[m];const body=document.getElementById('m-body');if(!body)return;
  try{let kql='';cfg.filters.forEach(f=>{const el=document.getElementById('m-f-'+f[0]);if(el&&el.value)kql+=(kql?' AND ':'')+`values[${f[0]}]="${el.value.replace(/"/g,'\\"')}"`});
    const last=PG.keys[PG.page];if(last)kql=kql?`(${kql}) AND createdAt<"${last}"`:`createdAt<"${last}"`;
    let path=`/kapps/${KAPP}/forms/${m}/submissions?include=values,details&limit=25`;if(kql)path+='&q='+encodeURIComponent(kql);
    const res=await api(path);let data=res.submissions||[];PG.hasNext=!!res.nextPageToken;if(PG.hasNext&&data.length)PG.keys[PG.page+1]=data[data.length-1].createdAt;
    const term=(document.getElementById('m-search')?.value||'').toLowerCase().trim();
    if(term)data=data.filter(s=>cfg.search.some(f=>String(v(s,f)).toLowerCase().includes(term)));
    body.innerHTML=data.length?data.map(s=>`<tr class="clickable-row" onclick="openRecord('${m}','${s.id}')">${cfg.cols.map(c=>cell(s,c)).join('')}</tr>`).join(''):`<tr><td colspan="${cfg.cols.length}" class="empty">No records found</td></tr>`;
    document.getElementById('m-info').textContent='Page '+PG.page;
    document.getElementById('m-prev').disabled=PG.page<=1;document.getElementById('m-next').disabled=!PG.hasNext;
  }catch(e){body.innerHTML=`<tr><td colspan="${cfg.cols.length}" style="color:var(--red);padding:16px">${esc(e.message)}</td></tr>`}}
function cell(s,c){const val=v(s,c[0]);if(c[2]==='badge')return`<td>${badge(val)}</td>`;if(c[2]==='num')return`<td class="num">${val?esc(val):'—'}</td>`;
  if(c[2]==='date'){const od=overdue(val)&&!/closed|complete|effective|approved/i.test(v(s,'Status'));return`<td${od?' style="color:var(--red);font-weight:700"':''}>${val?esc(val):'—'}${od?' ⚠':''}</td>`}
  if(c[1]==='ID')return`<td style="font-weight:700;color:var(--navy)">${esc(val)}</td>`;
  if(c[1]==='Title'||c[0]==='Name'||c[0]==='Curriculum')return`<td>${esc(val.length>52?val.slice(0,52)+'…':val)}</td>`;
  return`<td>${esc(val)}</td>`}

async function openRecord(form,subId){
  const d=document.getElementById('drawer'),ov=document.getElementById('drawer-overlay');
  document.getElementById('drawer-content').innerHTML='<div class="spin" style="color:#fff">Loading record…</div>';
  d.classList.add('show');ov.classList.add('show');
  try{const r=await sapi(`/api/ncrmanager/record360/${form}/${subId}`);renderDrawer(form,subId,r)}
  catch(e){document.getElementById('drawer-content').innerHTML=`<div class="drawer-head"><div><h2>Error</h2></div><button class="dh-x" onclick="closeDrawer()">×</button></div><div class="drawer-body"><div class="dsec">${esc(e.message)}</div></div>`}
}
function renderDrawer(form,subId,r){const cfg=MODULES[form];const rec=r.record;const vals=rec.values||{};
  const order=cfg.edit.map(e=>e[0]).filter(f=>vals[f]!=null&&vals[f]!=='');
  const fields=order.length?order:Object.keys(vals).filter(k=>vals[k]);
  const signBtn=cfg.signMeanings?`<button class="btn-gold btn-small" onclick="openSign('${form}','${esc(r.businessId)}','${subId}')">✍ Sign</button>`:'';
  let html=`<div class="drawer-head"><div><div class="dh-id">${esc(r.label)} · ${esc(r.businessId)}</div><h2>${esc(vals[cfg.title]||vals.Title||vals.Name||r.businessId)}</h2><div>${badge(vals.Status)} ${vals['Risk Level']?badge(vals['Risk Level']):''} ${vals.Severity?badge(vals.Severity):''}</div></div><button class="dh-x" onclick="closeDrawer()">×</button></div><div class="drawer-body">
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><button class="btn-primary btn-small" onclick="openEdit('${form}','${subId}')">✎ Edit</button>${signBtn}<button class="btn-outline btn-small" onclick="closeDrawer()">Close</button></div>`;
  // fields
  html+=`<div class="dsec"><h4>Record Details</h4><div class="fieldgrid">`+fields.map(f=>{const long=String(vals[f]).length>60;return`<div class="fld${long?'" style="grid-column:1/-1':''}"><div class="fl">${esc(f)}</div><div class="fv">${esc(vals[f])}</div></div>`}).join('')+`</div></div>`;
  // CAPA actions
  if(r.actions&&r.actions.length){html+=`<div class="dsec"><h4>Action Plan (${r.actions.length})</h4><table><thead><tr><th>Action</th><th>Owner</th><th>Due</th><th>Status</th></tr></thead><tbody>`+r.actions.map(a=>`<tr><td>${esc(a.title)}<div class="pill">${esc(a.type)}</div></td><td>${esc(a.owner)}</td><td${overdue(a.due)&&a.status!=='Completed'?' style="color:var(--red);font-weight:700"':''}>${esc(a.due||'—')}</td><td>${badge(a.status)}</td></tr>`).join('')+`</tbody></table></div>`}
  // relationship graph
  if(r.graph&&r.graph.nodes.length>1){html+=`<div class="dsec"><h4>Relationship Graph<span class="hint" style="float:right;font-weight:600;color:var(--blue)">click a node</span></h4><div class="graph-wrap">${relGraph(r.graph,r.businessId)}</div></div>`}
  // related records
  if(r.related&&r.related.length){html+=`<div class="dsec"><h4>Linked Records (${r.related.length})</h4>`+r.related.map(n=>`<div class="rel-item" ${n.subId?`onclick="openRecord('${n.form}','${n.subId}')"`:''}><span class="rt">${esc(n.type)}</span><span class="ri-id">${esc(n.id)}</span><span class="ri-t">${esc(n.label)}</span>${n.status?badge(n.status):''}</div>`).join('')+`</div>`}
  // signatures
  if(r.signatures&&r.signatures.length){html+=`<div class="dsec"><h4>Electronic Signatures · 21 CFR Part 11 (${r.signatures.length})</h4>`+r.signatures.map(s=>`<div class="sig"><div class="sg-m">✓ ${esc(s.meaning)}</div><div class="sg-s">${esc(s.signer)} · ${esc(s.date)} · v${esc(s.version)} · ${esc(s.method)}</div><div class="sg-s" style="color:var(--gray)">${esc(s.reason)}</div><div class="sg-h">${esc(s.hash)}</div></div>`).join('')+`</div>`}
  // timeline
  html+=`<div class="dsec"><h4>Audit Trail / Timeline (${r.timeline.length})</h4>`+(r.timeline.length?`<div class="tl">`+r.timeline.map(t=>`<div class="tl-item"><div class="tl-h">${esc(t.action)}${t.field&&t.field!=='—'?' · '+esc(t.field):''}</div><div class="tl-m">${t.oldV||t.newV?`${esc(t.oldV||'∅')} → <strong>${esc(t.newV||'∅')}</strong>`:''}${t.reason?` <span style="color:var(--gray)">— ${esc(t.reason)}</span>`:''}</div><div class="tl-d">${esc(t.actor)} · ${esc(t.ts)} · ${esc(t.state||'')} · ${esc(t.corr)}</div></div>`).join('')+`</div>`:`<p class="empty">No audit-trail entries</p>`)+`</div>`;
  html+=`</div>`;
  document.getElementById('drawer-content').innerHTML=html;
}
function relGraph(g,centerId){const nodes=g.nodes,edges=g.edges;const center=nodes.find(n=>n.id===centerId)||nodes[0];
  const others=nodes.filter(n=>n.id!==center.id);const N=others.length;const W=760,cx=W/2,cy=180,R=Math.min(140,60+N*8);const H=cy*2;
  const col={'CAPA':'#0B3D4F','Quality Event':'#1E7FB5','Nonconformance':'#E08A1E','Complaint':'#D14B3F','Risk':'#6E4FB0','Change':'#0E8C86','SCAR':'#9A6710','Product':'#157A52','Supplier':'#5C6670','Audit':'#12586F','Finding':'#A6362D','Training':'#1F9D6B','Document':'#3FA0D6'};
  const pos={};pos[center.id]={x:cx,y:cy};
  others.forEach((n,i)=>{const a=-Math.PI/2+i/Math.max(1,N)*Math.PI*2;pos[n.id]={x:cx+Math.cos(a)*R,y:cy+Math.sin(a)*R}});
  let svg=`<svg class="viz" viewBox="0 0 ${W} ${H}" style="min-width:${W}px">`;
  edges.forEach(e=>{const a=pos[e.from],b=pos[e.to];if(!a||!b)return;svg+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#C5D3DA" stroke-width="1.5"/>`;const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;svg+=`<text x="${mx}" y="${my-3}" text-anchor="middle" font-size="8.5" fill="#90A0A8">${esc(e.rel)}</text>`});
  const drawNode=(n,isC)=>{const p=pos[n.id];const c=col[n.type]||'#5C6670';const w=isC?150:122,h=isC?44:38;const sub=n.subId?`onclick="openRecord('${n.form}','${n.subId}')"`:'';svg+=`<g class="gnode" ${sub}><rect class="gn-box" x="${p.x-w/2}" y="${p.y-h/2}" width="${w}" height="${h}" rx="8" fill="${c}" opacity="${isC?1:.92}"/><text x="${p.x}" y="${p.y-3}" text-anchor="middle" font-size="${isC?11:10}" font-weight="700" fill="#fff">${esc(n.id)}</text><text x="${p.x}" y="${p.y+10}" text-anchor="middle" font-size="8.5" fill="#fff" opacity=".85">${esc((n.type+'').slice(0,18))}</text></g>`};
  others.forEach(n=>drawNode(n,false));drawNode(center,true);svg+=`</svg>`;return svg}

async function openEdit(form,subId){const cfg=MODULES[form];let vals={};let bid='';

function genId(form){const cfg=MODULES[form];const pref={'quality-events':'QE','nonconformances':'NC','capas':'CAPA','complaints':'CMP','audits':'AUD','audit-findings':'FND','documents':'DOC','change-requests':'CHG','training-records':'TRN','suppliers':'SUP','scars':'SCAR','risks':'RSK','equipment':'EQP','mgmt-reviews':'MR','sites':'SITE','products':'PRD'}[form]||'REC';return pref+'-'+Date.now().toString().slice(-6)}
async function saveEdit(){const{form,subId,orig}=_editCtx;const cfg=MODULES[form];const vals={};
  cfg.edit.forEach(([f])=>{const el=document.getElementById('ef-'+f);if(el)vals[f]=el.value});
  const reason=(document.getElementById('ef-_reason')?.value||'').trim();
  if(subId&&REGULATED.has(form)&&!reason){toast('Reason for change is required');return}
  try{let bid;
    if(subId){bid=orig[cfg.idField];await api(`/submissions/${subId}`,{method:'PUT',body:JSON.stringify({values:vals})});
      // diff → audit trail
      const changes=cfg.edit.map(([f])=>f).filter(f=>(orig[f]||'')!==(vals[f]||''));
      for(const f of changes.slice(0,12))await writeTrail(form,bid,'Update',f,orig[f]||'',vals[f]||'',vals.Status||orig.Status||'',reason);
      toast('Saved — '+changes.length+' field(s) updated');
    }else{bid=genId(form);vals[cfg.idField]=bid;const r=await api(`/kapps/${KAPP}/forms/${form}/submissions`,{method:'POST',body:JSON.stringify({values:vals,coreState:'Submitted'})});await writeTrail(form,bid,'Created','','','',vals.Status||'Open','Record created via MedQMS');toast('Created '+bid)}
    closeModal();if(activeTab==='module')fetchModule();else if(activeTab==='home')loadHome();
  }catch(e){toast('Save failed: '+e.message)}}

async function writeTrail(recType,recId,action,field,oldV,newV,state,reason){const corr='COR-'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);
  const vals={'Entry ID':'AT-'+Date.now().toString().slice(-8)+Math.floor(Math.random()*99),'Record Type':recType,'Record ID':recId,'Actor':API.displayName,'Action':action,'Field':field||'—','Old Value':String(oldV).slice(0,200),'New Value':String(newV).slice(0,200),'Reason':reason||'','Workflow State':state||'','Source':'MedQMS UI','Correlation ID':corr,'Timestamp':new Date().toISOString().slice(0,19).replace('T',' ')};
  try{await api(`/kapps/${KAPP}/forms/audit-trail/submissions`,{method:'POST',body:JSON.stringify({values:vals,coreState:'Submitted'})})}catch(e){}}

async function submitSign(form,bid,subId){const meaning=document.getElementById('sg-meaning').value;const reason=document.getElementById('sg-reason').value.trim();const pass=document.getElementById('sg-pass').value;
  if(!pass){toast('Password required to sign');return}
  // re-authenticate
  try{const r=await fetch(`${API.url}/app/api/v1/me`,{headers:{'Authorization':'Basic '+btoa(API.user+':'+pass)}});if(!r.ok){toast('Re-authentication failed');return}}catch(e){toast('Re-authentication failed');return}
  const corr='COR-'+Date.now().toString(36);const hash='sha256:'+Array.from({length:12},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
  const vals={'Signature ID':'SIG-'+Date.now().toString().slice(-8),'Record Type':form,'Record ID':bid,'Signer':API.user,'Signer Name':API.displayName,'Meaning':meaning,'Reason':reason||meaning,'Record Version':'1','Auth Method':'Password Re-authentication','Signed Date':new Date().toISOString().slice(0,19).replace('T',' '),'Hash':hash,'Correlation ID':corr};
  try{await api(`/kapps/${KAPP}/forms/esignatures/submissions`,{method:'POST',body:JSON.stringify({values:vals,coreState:'Submitted'})});
    await writeTrail(form,bid,'Electronic Signature','Signature',' ',meaning,'',reason||meaning);
    toast('Signature applied: '+meaning);closeModal();if(subId&&subId!=='null')openRecord(form,subId);
  }catch(e){toast('Sign failed: '+e.message)}}

  <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Configurable Area</th><th>What it controls</th><th>Shipped default</th></tr></thead><tbody>${rows.map(r=>`<tr><td style="font-weight:600">${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join('')}</tbody></table></div>`}
