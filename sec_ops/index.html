<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecurityOps - Kinetic Platform</title>
<style>
:root {
  --blue:#242F4D;--blue-light:#2E3B5E;--orange:#F36C24;--orange-light:#FF8A4C;
  --green:#34A853;--red:#EA4335;--yellow:#FBBC04;--gray:#5F6368;
  --light:#F8F9FA;--border:#E8EAED;--bg:#F1F3F4;--white:#fff;
  --shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --shadow-lg:0 4px 12px rgba(0,0,0,.15);
  --purple:#7B1FA2;--teal:#00695C;--indigo:#283593;--deep-orange:#BF360C;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#202124;font-size:14px}
a{color:var(--orange);text-decoration:none}a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit;font-size:13px;border:none;border-radius:6px;padding:8px 16px;transition:background .15s,opacity .15s}
button:hover{opacity:.9}button:disabled{opacity:.5;cursor:not-allowed}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:6px;padding:8px 12px;outline:none;transition:border-color .15s;background:var(--white)}
input:focus,select:focus,textarea:focus{border-color:var(--orange)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);border-bottom:2px solid var(--border);background:var(--light)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover{background:#F8F9FA}
.card{background:var(--white);border-radius:10px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--blue)}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.sev-critical,.sev-s1{background:#FDECEA;color:#C62828}
.sev-high,.sev-s2{background:#FFF3E0;color:#E65100}
.sev-medium,.sev-s3{background:#FFF8E1;color:#F9A825}
.sev-low,.sev-s4{background:#E8F5E9;color:#2E7D32}
.sev-informational{background:#F3E5F5;color:#7B1FA2}
.stat-new{background:#E3F2FD;color:#1565C0}
.stat-in-progress,.stat-in-remediation,.stat-running{background:#FFF8E1;color:#F57F17}
.stat-contained,.stat-triaged{background:#E0F2F1;color:#00695C}
.stat-eradicated,.stat-fixed,.stat-verified{background:#E8F5E9;color:#2E7D32}
.stat-recovered,.stat-succeeded{background:#E8F5E9;color:#1B5E20}
.stat-closed,.stat-suppressed{background:#F1F3F4;color:#5F6368}
.stat-converted,.stat-correlated{background:#EDE7F6;color:#4527A0}
.stat-accepted-risk{background:#FFF3E0;color:#E65100}
.stat-failed{background:#FDECEA;color:#C62828}
.btn-primary{background:var(--orange);color:#fff}
.btn-secondary{background:var(--blue);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-small{padding:4px 10px;font-size:12px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--gray)}
.btn-outline:hover{background:var(--light)}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--white);border-radius:10px;box-shadow:var(--shadow)}
.toolbar input[type="text"]{flex:1;min-width:200px}
.toolbar select{min-width:120px}
.subtabs{display:flex;gap:2px;margin-bottom:16px}
.subtabs button{background:var(--white);color:var(--gray);border:1px solid var(--border);border-radius:6px 6px 0 0;padding:8px 18px;font-weight:500}
.subtabs button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:var(--white);border-radius:10px;box-shadow:var(--shadow);padding:18px;text-align:center;border-top:4px solid var(--gray)}
.kpi-card .kpi-value{font-size:32px;font-weight:700;margin:6px 0}
.kpi-card .kpi-label{font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}}
.clickable-row{cursor:pointer}.clickable-row:hover{background:#EEF1F6!important}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-light) 50%,#3A4A73 100%)}
.login-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow-lg);padding:40px;width:380px;max-width:90vw}
.login-card h1{text-align:center;font-size:26px;margin-bottom:6px;color:var(--blue)}
.login-card h1 span{color:var(--orange)}
.login-card p{text-align:center;color:var(--gray);margin-bottom:24px;font-size:13px}
.login-card label{display:block;font-weight:600;font-size:12px;margin-bottom:4px;color:var(--gray);margin-top:14px}
.login-card input{width:100%}
.login-card button{width:100%;margin-top:22px;padding:12px;font-size:15px;font-weight:600}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
#app{display:none}
.topbar{position:sticky;top:0;z-index:100;background:var(--blue);color:#fff;display:flex;align-items:center;padding:0 20px;height:52px;box-shadow:var(--shadow)}
.topbar .logo{font-size:18px;font-weight:700;margin-right:30px;white-space:nowrap}
.topbar .logo span{color:var(--orange)}
.topbar nav{display:flex;gap:2px;flex:1;overflow-x:auto}
.topbar nav button{background:transparent;color:rgba(255,255,255,.7);padding:14px 14px;font-size:13px;font-weight:500;border-radius:0;border-bottom:3px solid transparent;white-space:nowrap}
.topbar nav button:hover{color:#fff;background:rgba(255,255,255,.06)}
.topbar nav button.active{color:#fff;border-bottom-color:var(--orange)}
.topbar .user-info{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap}
.topbar .user-info strong{color:white}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--orange);color:white}
.console{display:none;padding:20px;max-width:1400px;margin:0 auto}
.console.active{display:block}
#modal{display:none;position:fixed;inset:0;z-index:1000}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.modal-content{position:relative;background:var(--white);margin:30px auto;width:90%;max-width:800px;max-height:calc(100vh - 60px);overflow-y:auto;border-radius:12px;box-shadow:var(--shadow-lg);padding:28px;z-index:1}
.modal-content h2{font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-content .modal-close{position:absolute;top:12px;right:16px;background:none;font-size:22px;color:var(--gray);padding:4px 8px}
.modal-tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:16px}
.modal-tabs button{background:none;color:var(--gray);padding:8px 16px;font-weight:500;border-radius:6px 6px 0 0;border-bottom:3px solid transparent}
.modal-tabs button.active{color:var(--blue);border-bottom-color:var(--orange)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-bottom:16px}
.detail-field label{display:block;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.detail-field .val{font-size:14px;word-break:break-word}
.timeline-list{position:relative;padding-left:24px}
.timeline-list::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:16px;padding-left:16px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--orange);border:2px solid var(--white)}
.timeline-item .tl-time{font-size:11px;color:var(--gray)}
.timeline-item .tl-actor{font-weight:600;font-size:13px}
.timeline-item .tl-action{font-size:13px;margin-top:2px}
#toast{position:fixed;bottom:30px;right:30px;z-index:2000}
.toast-msg{background:var(--blue);color:#fff;padding:12px 24px;border-radius:8px;box-shadow:var(--shadow-lg);margin-top:8px;font-size:13px;animation:toastIn .3s ease}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.raw-payload{background:#1e1e2e;color:#cdd6f4;padding:14px;border-radius:8px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:12px;max-height:300px;overflow:auto;white-space:pre-wrap;word-break:break-all}
.sla-ok{color:var(--green);font-weight:600}.sla-breach{color:var(--red);font-weight:600}
.empty{text-align:center;padding:30px;color:var(--gray);font-style:italic}
.metric-card{text-align:center;padding:24px}
.metric-card .metric-val{font-size:36px;font-weight:700}
.metric-card .metric-label{font-size:12px;color:var(--gray);text-transform:uppercase;margin-top:4px}
.form-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:var(--gray)}
.form-group input,.form-group select,.form-group textarea{min-width:180px}
.env-prod,.env-production{background:#FDECEA;color:#C62828}
.env-staging{background:#FFF8E1;color:#F9A825}
.env-dev,.env-development{background:#E8F5E9;color:#2E7D32}
.env-dr{background:#E3F2FD;color:#1565C0}
.crit-5{color:#C62828;font-weight:700}.crit-4{color:#E65100;font-weight:700}
.crit-3{color:#F9A825;font-weight:600}.crit-2{color:#2E7D32}.crit-1{color:var(--gray)}
</style>
</head>
<body>
<div id="login-screen">
<div class="login-card">
<h1>Security<span>Ops</span></h1>
<p>Kinetic Security Operations Console</p>
<label>Server URL</label>
<input type="text" id="login-url" value="http://localhost:3007">
<label>Username</label>
<input type="text" id="login-user" autocomplete="username">
<label>Password</label>
<input type="password" id="login-pass" autocomplete="current-password">
<button class="btn-primary" onclick="doLogin()">Sign In</button>
<div class="login-error" id="login-error"></div>
</div>
</div>
<div id="app">
<div class="topbar">
<div class="logo">Security<span>Ops</span></div>
<nav id="main-nav">
<button class="active" onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('alerts')">Alerts</button>
<button onclick="showTab('incidents')">Incidents</button>
<button onclick="showTab('vulnerabilities')">Vulnerabilities</button>
<button onclick="showTab('assets')">Assets</button>
<button onclick="showTab('playbooks')">Playbooks</button>
<button onclick="showTab('reports')">Reports</button>
<button onclick="showTab('admin')">Admin</button>
</nav>
<div class="user-info">
<strong id="user-display"></strong>
<button class="logout-btn" onclick="doLogout()">Logout</button>
</div>
</div>
<div class="console active" id="tab-dashboard"></div>
<div class="console" id="tab-alerts"></div>
<div class="console" id="tab-incidents"></div>
<div class="console" id="tab-vulnerabilities"></div>
<div class="console" id="tab-assets"></div>
<div class="console" id="tab-playbooks"></div>
<div class="console" id="tab-reports"></div>
<div class="console" id="tab-admin"></div>
</div>
<div id="modal"><div class="modal-overlay" onclick="closeModal()"></div><div class="modal-content" id="modal-body"></div></div>
<div id="toast"></div>
<script>
/* ── API helpers ── */
let API={url:'',auth:'',user:'',displayName:'',spaceSlug:''};
async function api(path,opts={}){const r=await fetch(API.url+'/app/api/v1'+path,{...opts,headers:{'Authorization':'Basic '+API.auth,'Content-Type':'application/json',...(opts.headers||{})}});if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}
async function secopsApi(path,opts={}){const r=await fetch(API.url+path,{...opts,headers:{'Authorization':'Basic '+API.auth,'Content-Type':'application/json',...(opts.headers||{})}});if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}
function v(sub,field){return sub.values?.[field]||''}

/* ── pager infrastructure ── */
function makePager(){return{items:[],pageKeys:[null],pageIndex:0,hasNext:false,hasPrev:false}}
const PAGERS={alerts:makePager(),incidents:makePager(),vulns:makePager(),assets:makePager(),playbooks:makePager(),sla:makePager(),suppression:makePager()};

async function fetchPage(pager,formSlug,kql,direction){
if(direction==='reset'){pager.pageKeys=[null];pager.pageIndex=0}
else if(direction==='next'&&pager.hasNext){pager.pageIndex++}
else if(direction==='prev'&&pager.hasPrev){pager.pageIndex--}
let fullKql=kql||'';
const lastCreatedAt=pager.pageKeys[pager.pageIndex];
if(lastCreatedAt){const dc='createdAt < "'+lastCreatedAt+'"';fullKql=fullKql?'('+fullKql+') AND '+dc:dc}
let url='/kapps/sec-ops/forms/'+formSlug+'/submissions?include=values,details&limit=25';
if(fullKql)url+='&q='+encodeURIComponent(fullKql);
const r=await api(url);
pager.items=r.submissions||[];
pager.hasNext=!!r.nextPageToken;
if(pager.hasNext&&pager.items.length)pager.pageKeys[pager.pageIndex+1]=pager.items[pager.items.length-1].createdAt;
pager.hasPrev=pager.pageIndex>0}

async function fetchServerPage(pager,serverPath,direction){
if(direction==='reset'){pager.pageKeys=[null];pager.pageIndex=0}
else if(direction==='next'&&pager.hasNext){pager.pageIndex++}
else if(direction==='prev'&&pager.hasPrev){pager.pageIndex--}
const r=await secopsApi(serverPath);
pager.items=r.submissions||[];
pager.hasNext=!!r.nextPageToken;
if(pager.hasNext&&pager.items.length)pager.pageKeys[pager.pageIndex+1]=pager.items[pager.items.length-1].createdAt;
pager.hasPrev=pager.pageIndex>0}

function pgCtrl(pager,navFn){
if(!pager.hasNext&&!pager.hasPrev)return'';
return'<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1px solid var(--border)"><button class="btn-outline btn-small" onclick="'+navFn+"('prev')\" "+(pager.hasPrev?'':'disabled')+'>&#8592; Previous</button><span style="color:var(--gray);font-size:13px">Page '+(pager.pageIndex+1)+'</span><button class="btn-outline btn-small" onclick="'+navFn+"('next')\" "+(pager.hasNext?'':'disabled')+'>Next &#8594;</button></div>'}

/* ── utilities ── */
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function sevBadge(s){if(!s)return'';return'<span class="badge sev-'+s.toLowerCase().replace(/\s+/g,'-')+'">'+esc(s)+'</span>'}
function statBadge(s){if(!s)return'';return'<span class="badge stat-'+s.toLowerCase().replace(/\s+/g,'-')+'">'+esc(s)+'</span>'}
function formatDate(iso){if(!iso)return'-';const d=new Date(iso);if(isNaN(d))return iso;return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+', '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
function formatDateShort(iso){if(!iso)return'-';const d=new Date(iso);if(isNaN(d))return iso;return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function timeAgo(iso){if(!iso)return'-';const d=new Date(iso);if(isNaN(d))return iso;const diff=Date.now()-d.getTime();const m=Math.floor(diff/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';const dy=Math.floor(h/24);if(dy<30)return dy+'d ago';return Math.floor(dy/30)+'mo ago'}
function isOverdue(ds){if(!ds)return false;return new Date(ds)<new Date()}
function slaStatus(rBy,cBy,rsBy,bf){const rb=bf?.response==='true'||isOverdue(rBy);const cb=bf?.containment==='true'||isOverdue(cBy);const rsb=bf?.resolution==='true'||isOverdue(rsBy);if(rb||cb||rsb)return'<span class="sla-breach" title="SLA Breached">&#9888; Breached</span>';return'<span class="sla-ok" title="SLA OK">&#10003; OK</span>'}
function showToast(msg){const el=document.getElementById('toast');const t=document.createElement('div');t.className='toast-msg';t.textContent=msg;el.appendChild(t);setTimeout(()=>t.remove(),3000)}
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').style.display='block'}
function closeModal(){document.getElementById('modal').style.display='none';document.getElementById('modal-body').innerHTML=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ── login / session ── */
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
let cachedPlaybooks=null;
async function doLogin(){
const url=document.getElementById('login-url').value.replace(/\/+$/,'');
const user=document.getElementById('login-user').value;
const pass=document.getElementById('login-pass').value;
const errEl=document.getElementById('login-error');errEl.textContent='';
if(!url||!user||!pass){errEl.textContent='All fields required.';return}
API.url=url;API.auth=btoa(user+':'+pass);API.user=user;
try{const me=await api('/me');API.displayName=me.displayName||me.username||me.user?.displayName||me.user?.username||user;
try{const sr=await fetch(API.url+'/app/api/v1/space',{headers:{'Authorization':'Basic '+API.auth,'Accept':'application/json'}});if(sr.ok){const sd=await sr.json();API.spaceSlug=(sd.space||sd).slug||'';}}catch(e2){}
sessionStorage.setItem('kinetic_session',JSON.stringify(API));
document.getElementById('login-screen').style.display='none';
document.getElementById('app').style.display='block';
document.getElementById('user-display').textContent=API.displayName+(API.spaceSlug?' \u00b7 '+API.spaceSlug:'');
await loadDashboard();
}catch(e){errEl.textContent='Login failed: '+e.message}}

function doLogout(){sessionStorage.removeItem('kinetic_session');API={url:'',auth:'',user:'',displayName:'',spaceSlug:''};
Object.values(PAGERS).forEach(p=>{Object.assign(p,makePager())});cachedPlaybooks=null;
document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';
document.getElementById('login-pass').value='';document.getElementById('login-error').textContent=''}

async function restoreSession(){const s=sessionStorage.getItem('kinetic_session');if(!s)return;try{API=JSON.parse(s);const r=await fetch(API.url+'/app/api/v1/me',{headers:{'Authorization':'Basic '+API.auth}});if(!r.ok)throw 0;
if(!API.spaceSlug){try{const sr=await fetch(API.url+'/app/api/v1/space',{headers:{'Authorization':'Basic '+API.auth,'Accept':'application/json'}});if(sr.ok){const sd=await sr.json();API.spaceSlug=(sd.space||sd).slug||'';sessionStorage.setItem('kinetic_session',JSON.stringify(API));}}catch(e2){}}
document.getElementById('user-display').textContent=(API.displayName||API.user)+(API.spaceSlug?' \u00b7 '+API.spaceSlug:'');document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';await loadDashboard()}catch(e){sessionStorage.removeItem('kinetic_session');API={url:'',auth:'',user:'',displayName:'',spaceSlug:''}}}
restoreSession();

/* ── tabs ── */
const TABS=['dashboard','alerts','incidents','vulnerabilities','assets','playbooks','reports','admin'];
function showTab(name){
document.querySelectorAll('.console').forEach(c=>c.classList.remove('active'));
document.getElementById('tab-'+name).classList.add('active');
document.querySelectorAll('#main-nav button').forEach(b=>b.classList.remove('active'));
const idx=TABS.indexOf(name);if(idx>=0)document.querySelectorAll('#main-nav button')[idx].classList.add('active');
const loaders={dashboard:loadDashboard,alerts:loadAlerts,incidents:loadIncidents,vulnerabilities:loadVulnerabilities,assets:loadAssets,playbooks:loadPlaybooks,reports:loadReports,admin:loadAdmin};
if(loaders[name])loaders[name]()}

/* ===== DASHBOARD ===== */
async function loadDashboard(){
const el=document.getElementById('tab-dashboard');
el.innerHTML='<div class="empty">Loading dashboard...</div>';
try{const d=await secopsApi('/api/secops/stats');
el.innerHTML=`
<div class="kpi-row">
<div class="kpi-card" style="border-top-color:var(--red)"><div class="kpi-label">Open Incidents</div><div class="kpi-value">${d.incidents.open}</div></div>
<div class="kpi-card" style="border-top-color:var(--red)"><div class="kpi-label">SLA Breaches</div><div class="kpi-value">${d.incidents.slaBreaches}</div></div>
<div class="kpi-card" style="border-top-color:var(--orange)"><div class="kpi-label">New Alerts 24h</div><div class="kpi-value">${d.alerts.last24h}</div></div>
<div class="kpi-card" style="border-top-color:var(--yellow)"><div class="kpi-label">Open Vulns</div><div class="kpi-value">${d.vulns.open}</div></div>
<div class="kpi-card" style="border-top-color:var(--red)"><div class="kpi-label">Overdue Vulns</div><div class="kpi-value">${d.vulns.overdue}</div></div>
<div class="kpi-card" style="border-top-color:var(--teal)"><div class="kpi-label">Mean Time to Contain</div><div class="kpi-value">${d.incidents.mttc}</div></div>
</div>
<div class="grid-2">
<div class="card"><h3>Incidents by Severity</h3><table><thead><tr><th>Severity</th><th>Count</th></tr></thead><tbody>
<tr><td>${sevBadge('S1')}</td><td>${d.incidents.bySeverity.S1}</td></tr><tr><td>${sevBadge('S2')}</td><td>${d.incidents.bySeverity.S2}</td></tr>
<tr><td>${sevBadge('S3')}</td><td>${d.incidents.bySeverity.S3}</td></tr><tr><td>${sevBadge('S4')}</td><td>${d.incidents.bySeverity.S4}</td></tr>

function buildAlertKql(){
const f=alertFilters,parts=[];let cf={};
if(alertSubtab==='triage'){
  parts.push('values[Status]="New"');
  if(f.severity){parts.push('values[Severity]="'+f.severity+'"');if(f.source)cf.Source=f.source;if(f.category)cf.Category=f.category}
  else if(f.source){parts.push('values[Source]="'+f.source+'"');if(f.category)cf.Category=f.category}
  else if(f.category){parts.push('values[Category]="'+f.category+'"')}
} else {
  if(f.status&&f.severity){parts.push('values[Status]="'+f.status+'"');parts.push('values[Severity]="'+f.severity+'"');if(f.source)cf.Source=f.source;if(f.category)cf.Category=f.category}
  else if(f.severity){parts.push('values[Severity]="'+f.severity+'"');if(f.source)cf.Source=f.source;if(f.category)cf.Category=f.category;if(f.status)cf.Status=f.status}
  else if(f.status){parts.push('values[Status]="'+f.status+'"');if(f.source)cf.Source=f.source;if(f.category)cf.Category=f.category}
  else if(f.source){parts.push('values[Source]="'+f.source+'"');if(f.category)cf.Category=f.category}
  else if(f.category){parts.push('values[Category]="'+f.category+'"')}
}
return{kql:parts.join(' AND '),cf}}

/* ===== VULNERABILITIES ===== */
let vulnSubtab='open',vulnFilters={search:'',severity:'',status:'',source:''};

function buildVulnKql(){
const f=vulnFilters,parts=[];let cf={};
if(vulnSubtab==='open'){
  if(f.severity){parts.push('values[Severity]="'+f.severity+'"');cf._openOnly=true}
  else{cf._openOnly=true}
  if(f.source)cf.Source=f.source;if(f.status)cf.Status=f.status;
} else if(vulnSubtab==='accepted'){
  parts.push('values[Status]="Accepted Risk"');
  if(f.severity)cf.Severity=f.severity;if(f.source)cf.Source=f.source;
} else {
  if(f.severity){parts.push('values[Severity]="'+f.severity+'"');if(f.status)cf.Status=f.status;if(f.source)cf.Source=f.source}
  else if(f.status){parts.push('values[Status]="'+f.status+'"');if(f.source)cf.Source=f.source}
  else if(f.source){parts.push('values[Source]="'+f.source+'"')}
}
return{kql:parts.join(' AND '),cf}}

let assetFilters={search:'',environment:'',criticality:'',ownerTeam:''};
const ASSET_ENVIRONMENTS=['Prod','Staging','Dev'];

function buildAssetKql(){
const f=assetFilters,parts=[];let cf={};
if(f.environment&&f.criticality){parts.push('values[Environment]="'+f.environment+'"');parts.push('values[Criticality]="'+f.criticality+'"');if(f.ownerTeam)cf['Owner Team']=f.ownerTeam}
else if(f.environment&&f.ownerTeam){parts.push('values[Environment]="'+f.environment+'"');parts.push('values[Owner Team]="'+f.ownerTeam+'"');if(f.criticality)cf.Criticality=f.criticality}
else if(f.environment){parts.push('values[Environment]="'+f.environment+'"');if(f.criticality)cf.Criticality=f.criticality;if(f.ownerTeam)cf['Owner Team']=f.ownerTeam}
else if(f.criticality){parts.push('values[Criticality]="'+f.criticality+'"');if(f.ownerTeam)cf['Owner Team']=f.ownerTeam}
else if(f.ownerTeam){parts.push('values[Owner Team]="'+f.ownerTeam+'"')}
return{kql:parts.join(' AND '),cf}}

</tbody></table>${pgCtrl(PAGERS.playbooks,'pagePlaybooks')}</div>`}catch(e){showToast('Error: '+e.message)}}

async function openPbDetail(id){
try{const r=await api('/submissions/'+id+'?include=values');const s=r.submission;if(!s)return;
let steps=[];try{steps=JSON.parse(v(s,'Steps')||'[]')}catch(e){}
const pbName=v(s,'Name');
let runs=[];
try{const rr=await api('/kapps/sec-ops/forms/playbook-run/submissions?include=values&limit=25&q='+encodeURIComponent('values[Playbook Name]="'+pbName+'"'));runs=rr.submissions||[]}catch(e){}
openModal(`<button class="modal-close" onclick="closeModal()">&times;</button>
<h2>${esc(pbName)}</h2>
<div class="detail-grid">
<div class="detail-field"><label>Trigger Type</label><div class="val">${esc(v(s,'Trigger Type'))}</div></div>
<div class="detail-field"><label>Automation Level</label><div class="val">${esc(v(s,'Automation Level'))}</div></div>
<div class="detail-field"><label>Category</label><div class="val">${esc(v(s,'Category'))}</div></div>
<div class="detail-field"><label>Required Roles</label><div class="val">${esc(v(s,'Required Roles'))}</div></div>
<div class="detail-field"><label>Est. Duration</label><div class="val">${esc(v(s,'Estimated Duration'))}</div></div>
<div class="detail-field"><label>Active</label><div class="val">${v(s,'Active')==='true'?'Yes':'No'}</div></div>
</div>
<div class="detail-field" style="margin-bottom:14px"><label>Description</label><div class="val">${esc(v(s,'Description'))}</div></div>
<hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
<h3 style="margin-bottom:10px">Steps</h3>
${steps.length===0?'<p class="empty">No steps defined</p>':`<ol style="padding-left:20px">${steps.map(st=>`<li style="margin-bottom:10px"><strong>${esc(st.name||st.Name||'')}</strong>
${st.type||st.Type?' <span class="badge stat-new">'+esc(st.type||st.Type)+'</span>':''}
${st.role||st.Role?' <span style="font-size:11px;color:var(--gray)">Role: '+esc(st.role||st.Role)+'</span>':''}
${st.description||st.Description?'<div style="font-size:13px;color:var(--gray);margin-top:2px">'+esc(st.description||st.Description)+'</div>':''}</li>`).join('')}</ol>`}
<hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
<h3 style="margin-bottom:10px">Recent Runs (${runs.length})</h3>
<table><thead><tr><th>Target</th><th>Status</th><th>Started</th><th>Executed By</th></tr></thead><tbody>
${runs.length===0?'<tr><td colspan="4" class="empty">No runs</td></tr>':runs.map(rn=>`<tr><td>${esc(v(rn,'Target Type'))}: ${esc(v(rn,'Target ID'))}</td><td>${statBadge(v(rn,'Status'))}</td><td>${formatDate(v(rn,'Started At'))}</td><td>${esc(v(rn,'Executed By'))}</td></tr>`).join('')}
</tbody></table>
<hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
<h3 style="margin-bottom:10px">Run Playbook</h3>
<div class="form-row"><div class="form-group"><label>Target Type</label><select id="pb-tt"><option>Incident</option><option>Alert</option><option>Vulnerability</option><option>Asset</option></select></div>
<div class="form-group"><label>Target ID</label><input type="text" id="pb-tid" placeholder="Submission ID..."></div>
<button class="btn-primary" onclick="runPb('${s.id}')" style="align-self:flex-end">Run</button></div>`)}catch(e){showToast('Error: '+e.message)}}

async function runPb(pid){const tt=document.getElementById('pb-tt')?.value||'';const tid=document.getElementById('pb-tid')?.value||'';
try{await secopsApi('/api/secops/playbooks/'+pid+'/run',{method:'POST',body:JSON.stringify({target_type:tt,target_id:tid,executed_by:API.displayName})});
showToast('Playbook execution started');closeModal()}catch(e){showToast('Error: '+e.message)}}

/* ===== REPORTS ===== */
async function loadReports(){
const el=document.getElementById('tab-reports');
el.innerHTML='<div class="empty">Loading reports...</div>';
try{const d=await secopsApi('/api/secops/stats/reports');
const maxW=Math.max(...d.weeklyAlerts.map(w=>w.count),1);
el.innerHTML=`<div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">
<div class="card metric-card"><div class="metric-val" style="color:var(--orange)">${d.mtta}</div><div class="metric-label">Mean Time to Acknowledge (MTTA)</div></div>
<div class="card metric-card"><div class="metric-val" style="color:var(--teal)">${d.mttc}</div><div class="metric-label">Mean Time to Contain (MTTC)</div></div>
<div class="card metric-card"><div class="metric-val" style="color:var(--indigo)">${d.mttr}</div><div class="metric-label">Mean Time to Resolve (MTTR)</div></div>
</div>
<div class="card"><h3>Vulnerability Remediation Aging</h3><table><thead><tr><th>Age Bucket</th><th>Open Vulns</th></tr></thead><tbody>
${Object.entries(d.vulnAging).map(([k,c])=>`<tr><td>${k}</td><td><strong>${c}</strong></td></tr>`).join('')}
</tbody></table></div>
<div class="grid-2">
<div class="card metric-card"><div class="metric-val" style="color:var(--green)">${d.closedThisMonth}</div><div class="metric-label">Incidents Closed This Month</div></div>
<div class="card metric-card"><div class="metric-val" style="color:var(--green)">${d.fixedThisMonth}</div><div class="metric-label">Vulns Fixed This Month</div></div>
</div>
<div class="card"><h3>Alert Volume Trend (Weekly)</h3><table><thead><tr><th>Week Starting</th><th>Alerts</th><th>Volume</th></tr></thead><tbody>
${d.weeklyAlerts.map(w=>`<tr><td>${w.label}</td><td><strong>${w.count}</strong></td><td><div style="background:var(--orange);height:18px;width:${Math.round(w.count/maxW*100)}%;border-radius:4px;min-width:${w.count>0?'4px':'0'}"></div></td></tr>`).join('')}
</tbody></table></div>`}catch(e){el.innerHTML='<div class="empty">Error loading reports: '+esc(e.message)+'</div>'}}

/* ===== ADMIN ===== */
let adminSubtab='sla';
async function loadAdmin(){
const el=document.getElementById('tab-admin');
el.innerHTML=`<div class="subtabs" id="admin-subtabs">
<button class="${adminSubtab==='sla'?'active':''}" onclick="adminSubtab='sla';loadAdminContent();document.querySelectorAll('#admin-subtabs button').forEach(b=>b.classList.remove('active'));this.classList.add('active')">SLA Policies</button>
<button class="${adminSubtab==='suppression'?'active':''}" onclick="adminSubtab='suppression';loadAdminContent();document.querySelectorAll('#admin-subtabs button').forEach(b=>b.classList.remove('active'));this.classList.add('active')">Suppression Rules</button>
</div><div id="admin-ct"><div class="empty">Loading...</div></div>`;
await loadAdminContent()}

async function loadAdminContent(){
try{if(adminSubtab==='sla'){
  await fetchPage(PAGERS.sla,'sla-policy','','reset');renderSLA()
}else{
  await fetchPage(PAGERS.suppression,'suppression-rule','','reset');renderSupp()
}}catch(e){document.getElementById('admin-ct').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'}}

function renderSLA(){
const list=PAGERS.sla.items;
document.getElementById('admin-ct').innerHTML=`<div style="margin-bottom:12px"><button class="btn-primary" onclick="openSLAModal()">Add Policy</button></div>
<div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Name</th><th>Applies To</th><th>Severity</th><th>Response Time</th><th>Contain Time</th><th>Resolve Time</th><th>Active</th></tr></thead><tbody>
${list.length===0?'<tr><td colspan="7" class="empty">No SLA policies</td></tr>':list.map(s=>`<tr class="clickable-row" onclick="openSLAModal('${s.id}')">
<td><strong>${esc(v(s,'Name'))}</strong></td><td>${esc(v(s,'Applies To'))}</td><td>${sevBadge(v(s,'Severity'))}</td>
<td>${esc(v(s,'Response Time'))}</td><td>${esc(v(s,'Contain Time'))}</td><td>${esc(v(s,'Resolve Time'))}</td>
<td>${v(s,'Active')==='true'?'<span class="badge sev-low">Active</span>':'<span class="badge stat-closed">Inactive</span>'}</td></tr>`).join('')}
</tbody></table>${pgCtrl(PAGERS.sla,'pageSLA')}</div>`}

async function pageSLA(dir){try{await fetchPage(PAGERS.sla,'sla-policy','',dir);renderSLA()}catch(e){showToast('Error: '+e.message)}}

function openSLAModal(id){
const s=id?PAGERS.sla.items.find(p=>p.id===id):null;
if(id&&!s){api('/submissions/'+id+'?include=values').then(r=>{openSLAModalWith(r.submission)}).catch(e=>showToast('Error: '+e.message));return}
openSLAModalWith(s)}

function openSLAModalWith(s){const isE=!!s;
openModal(`<button class="modal-close" onclick="closeModal()">&times;</button>
<h2>${isE?'Edit':'Add'} SLA Policy</h2>
<div class="form-group" style="margin-bottom:10px"><label>Name</label><input type="text" id="sla-name" value="${esc(s?v(s,'Name'):'')}"></div>
<div class="form-row">
<div class="form-group"><label>Applies To</label><select id="sla-applies"><option ${s&&v(s,'Applies To')==='Incident'?'selected':''}>Incident</option><option ${s&&v(s,'Applies To')==='Vulnerability'?'selected':''}>Vulnerability</option></select></div>
<div class="form-group"><label>Severity</label><select id="sla-sev"><option value="">All</option><option ${s&&v(s,'Severity')==='S1'?'selected':''}>S1</option><option ${s&&v(s,'Severity')==='S2'?'selected':''}>S2</option><option ${s&&v(s,'Severity')==='S3'?'selected':''}>S3</option><option ${s&&v(s,'Severity')==='S4'?'selected':''}>S4</option></select></div>
</div>
<div class="form-row">
<div class="form-group"><label>Response Time</label><input type="text" id="sla-rt" value="${esc(s?v(s,'Response Time'):'')}"></div>
<div class="form-group"><label>Contain Time</label><input type="text" id="sla-ct" value="${esc(s?v(s,'Contain Time'):'')}"></div>
<div class="form-group"><label>Resolve Time</label><input type="text" id="sla-rst" value="${esc(s?v(s,'Resolve Time'):'')}"></div>
</div>
<div class="form-group" style="margin-bottom:16px"><label>Active</label><select id="sla-act"><option value="true" ${!s||v(s,'Active')==='true'?'selected':''}>Yes</option><option value="false" ${s&&v(s,'Active')==='false'?'selected':''}>No</option></select></div>
<button class="btn-primary" onclick="saveSLA('${s?s.id:''}')">${isE?'Save Changes':'Create Policy'}</button>`)}

async function saveSLA(id){const vals={'Name':document.getElementById('sla-name')?.value||'','Applies To':document.getElementById('sla-applies')?.value||'',
'Severity':document.getElementById('sla-sev')?.value||'','Response Time':document.getElementById('sla-rt')?.value||'',
'Contain Time':document.getElementById('sla-ct')?.value||'','Resolve Time':document.getElementById('sla-rst')?.value||'',
'Active':document.getElementById('sla-act')?.value||'true'};
if(!vals.Name){showToast('Name is required');return}
try{if(id){await api('/submissions/'+id+'/values',{method:'PUT',body:JSON.stringify(vals)});showToast('Policy updated')}
else{await api('/kapps/sec-ops/forms/sla-policy/submissions',{method:'POST',body:JSON.stringify({values:vals})});showToast('Policy created')}
closeModal();await fetchPage(PAGERS.sla,'sla-policy','','reset');renderSLA()}catch(e){showToast('Error: '+e.message)}}

function renderSupp(){
const list=PAGERS.suppression.items;
document.getElementById('admin-ct').innerHTML=`<div style="margin-bottom:12px"><button class="btn-primary" onclick="openSuppModal()">Add Rule</button></div>
<div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Name</th><th>Match Field</th><th>Pattern</th><th>Source Filter</th><th>Status</th></tr></thead><tbody>
${list.length===0?'<tr><td colspan="5" class="empty">No suppression rules</td></tr>':list.map(s=>`<tr class="clickable-row" onclick="openSuppModal('${s.id}')">
<td><strong>${esc(v(s,'Name'))}</strong></td><td>${esc(v(s,'Match Field'))}</td><td><code>${esc(v(s,'Pattern'))}</code></td>
<td>${esc(v(s,'Source Filter'))}</td>
<td>${v(s,'Active')==='true'||v(s,'Status')==='Active'?'<span class="badge sev-low">Active</span>':'<span class="badge stat-closed">Inactive</span>'}</td></tr>`).join('')}
</tbody></table>${pgCtrl(PAGERS.suppression,'pageSupp')}</div>`}

async function pageSupp(dir){try{await fetchPage(PAGERS.suppression,'suppression-rule','',dir);renderSupp()}catch(e){showToast('Error: '+e.message)}}

function openSuppModal(id){
const s=id?PAGERS.suppression.items.find(r=>r.id===id):null;
if(id&&!s){api('/submissions/'+id+'?include=values').then(r=>{openSuppModalWith(r.submission)}).catch(e=>showToast('Error: '+e.message));return}
openSuppModalWith(s)}

function openSuppModalWith(s){const isE=!!s;
openModal(`<button class="modal-close" onclick="closeModal()">&times;</button>
<h2>${isE?'Edit':'Add'} Suppression Rule</h2>
<div class="form-group" style="margin-bottom:10px"><label>Name</label><input type="text" id="sup-name" value="${esc(s?v(s,'Name'):'')}"></div>
<div class="form-row">
<div class="form-group"><label>Match Field</label><select id="sup-field"><option ${s&&v(s,'Match Field')==='Title'?'selected':''}>Title</option><option ${s&&v(s,'Match Field')==='Category'?'selected':''}>Category</option><option ${s&&v(s,'Match Field')==='Hostname'?'selected':''}>Hostname</option><option ${s&&v(s,'Match Field')==='Source'?'selected':''}>Source</option><option ${s&&v(s,'Match Field')==='Indicators'?'selected':''}>Indicators</option></select></div>
<div class="form-group"><label>Pattern (regex)</label><input type="text" id="sup-pat" value="${esc(s?v(s,'Pattern'):'')}"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Source Filter</label><select id="sup-src"><option value="">All Sources</option><option ${s&&v(s,'Source Filter')==='Splunk'?'selected':''}>Splunk</option><option ${s&&v(s,'Source Filter')==='CrowdStrike'?'selected':''}>CrowdStrike</option><option ${s&&v(s,'Source Filter')==='Sentinel'?'selected':''}>Sentinel</option><option ${s&&v(s,'Source Filter')==='Palo Alto'?'selected':''}>Palo Alto</option></select></div>
<div class="form-group"><label>Status</label><select id="sup-st"><option value="Active" ${!s||v(s,'Status')==='Active'||v(s,'Active')==='true'?'selected':''}>Active</option><option value="Inactive" ${s&&(v(s,'Status')==='Inactive'||v(s,'Active')==='false')?'selected':''}>Inactive</option></select></div>
</div>
<div class="form-group" style="margin-bottom:16px"><label>Description</label><textarea id="sup-desc" rows="2" style="width:100%">${esc(s?v(s,'Description'):'')}</textarea></div>
<button class="btn-primary" onclick="saveSupp('${s?s.id:''}')">${isE?'Save Changes':'Create Rule'}</button>`)}

async function saveSupp(id){const vals={'Name':document.getElementById('sup-name')?.value||'','Match Field':document.getElementById('sup-field')?.value||'',
'Pattern':document.getElementById('sup-pat')?.value||'','Source Filter':document.getElementById('sup-src')?.value||'',
'Status':document.getElementById('sup-st')?.value||'Active','Active':document.getElementById('sup-st')?.value==='Active'?'true':'false',
'Description':document.getElementById('sup-desc')?.value?.trim()||''};
if(!vals.Name){showToast('Name is required');return}
try{if(id){await api('/submissions/'+id+'/values',{method:'PUT',body:JSON.stringify(vals)});showToast('Rule updated')}
else{await api('/kapps/sec-ops/forms/suppression-rule/submissions',{method:'POST',body:JSON.stringify({values:vals})});showToast('Rule created')}
closeModal();await fetchPage(PAGERS.suppression,'suppression-rule','','reset');renderSupp()}catch(e){showToast('Error: '+e.message)}}
</script>
</body>
