<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kinetic GRC Command Center</title>
<style>
:root{
  --indigo:#3B5BDB; --indigo-d:#2C3E9E; --ink:#1A1F36; --slate:#5A6377; --muted:#8A93A6;
  --line:#E5E8F0; --bg:#F4F6FB; --card:#FFFFFF; --bg2:#EDF2FF;
  --green:#2F9E44; --green-bg:#E6F4EA; --yellow:#E8910C; --yellow-bg:#FFF4E0; --red:#E03131; --red-bg:#FDECEC;
  --crit:#C92A2A; --high:#E8590C; --med:#E8910C; --low:#3BA55C;
  --shadow:0 1px 3px rgba(20,30,60,.08),0 1px 2px rgba(20,30,60,.04);
  --shadow-h:0 6px 20px rgba(20,30,60,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
#app{display:none}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#CBD2E0;border-radius:6px}

/* ── layout ── */
.topbar{height:58px;background:linear-gradient(95deg,#26336b,#3B5BDB);display:flex;align-items:center;padding:0 20px;gap:18px;color:#fff;position:sticky;top:0;z-index:40;box-shadow:0 2px 8px rgba(20,30,60,.18)}
.topbar .brand{font-weight:800;font-size:17px;letter-spacing:.2px;display:flex;align-items:center;gap:10px;white-space:nowrap}
.topbar .brand .sh{opacity:.9}
.topbar .brand b{font-weight:800}.topbar .brand span{font-weight:500;opacity:.85}
.topbar .spacer{flex:1}
.tenant-pick{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:5px 8px 5px 12px}
.tenant-pick label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.8}
.tenant-pick select{background:transparent;border:none;color:#fff;font-size:13px;font-weight:600;outline:none;padding:3px}
.tenant-pick select option{color:#1A1F36}
.topbar .who{font-size:12.5px;opacity:.92;display:flex;align-items:center;gap:8px}
.topbar .who .av{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.topbar .lo{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600}
.layout{display:flex;min-height:calc(100vh - 58px)}
.side{width:230px;background:var(--card);border-right:1px solid var(--line);padding:14px 12px;flex-shrink:0}
.side .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;margin:16px 10px 6px}
.side a{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:8px;color:var(--slate);font-weight:600;font-size:13.2px;margin-bottom:1px;transition:.12s}
.side a:hover{background:var(--bg2);color:var(--indigo)}
.side a.on{background:var(--indigo);color:#fff}
.side a.on svg{stroke:#fff}
.side a svg{width:17px;height:17px;stroke:var(--muted);flex-shrink:0}
.side a:hover svg{stroke:var(--indigo)}
.main{flex:1;padding:22px 26px;max-width:1380px}
.vhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap}
.vhead h1{font-size:21px;font-weight:800;letter-spacing:-.2px}
.vhead .sub{color:var(--slate);font-size:13px;margin-top:3px}

/* ── cards / grids ── */
.grid{display:grid;gap:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lab{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
.kpi .val{font-size:27px;font-weight:800;margin-top:5px;letter-spacing:-.5px}
.kpi .meta{font-size:12px;color:var(--slate);margin-top:3px}
.kpi .strip{position:absolute;left:0;top:0;bottom:0;width:4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:18px}
.card h3{font-size:14px;font-weight:800;margin-bottom:2px}
.card .ch-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.cols{display:grid;gap:16px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c23{grid-template-columns:1.4fr 1fr}
@media(max-width:1000px){.c2,.c3,.c23{grid-template-columns:1fr}}

/* ── badges / pills ── */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green)}.b-yellow{background:var(--yellow-bg);color:var(--yellow)}.b-red{background:var(--red-bg);color:var(--red)}
.b-crit{background:#FCE4E4;color:var(--crit)}.b-high{background:#FFEAD9;color:var(--high)}.b-med{background:#FFF4E0;color:var(--med)}.b-low{background:#E6F4EA;color:var(--low)}
.b-gray{background:#EEF1F6;color:var(--slate)}.b-ind{background:var(--bg2);color:var(--indigo)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot-Green{background:var(--green)}.dot-Yellow{background:var(--yellow)}.dot-Red{background:var(--red)}

/* ── table ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card)}
td{padding:10px 12px;border-bottom:1px solid #F0F2F8}
tbody tr{transition:.1s}tbody tr:hover{background:var(--bg2)}
tbody tr.click{cursor:pointer}
.tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);overflow:hidden}
.tbl-wrap .scroll{max-height:560px;overflow:auto}

/* ── bars ── */
.bar{height:9px;background:#EDF0F7;border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:6px;background:var(--indigo)}
.frow{display:grid;grid-template-columns:170px 1fr 46px;gap:11px;align-items:center;margin-bottom:11px;font-size:12.5px}
.frow .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.frow .pc{font-weight:800;text-align:right;font-variant-numeric:tabular-nums}

/* ── heatmap ── */
.heat{border-collapse:separate;border-spacing:3px}
.heat td,.heat th{padding:0}
.heat .hc{width:54px;height:38px;border-radius:7px;text-align:center;vertical-align:middle;font-weight:800;font-size:13px;color:#fff}
.heat .rl{font-size:11.5px;font-weight:600;color:var(--slate);padding-right:10px;text-align:right;white-space:nowrap}
.heat .cl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:center;padding-bottom:4px}

/* ── kanban ── */
.kanban{display:flex;gap:13px;overflow-x:auto;padding-bottom:8px}
.kcol{background:#EEF1F8;border-radius:11px;padding:11px;min-width:225px;width:225px;flex-shrink:0}
.kcol h4{font-size:12px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;color:var(--slate)}
.kcol h4 .n{background:#fff;border-radius:20px;padding:1px 8px;font-size:11px}
.kcard{background:#fff;border-radius:9px;padding:10px;margin-bottom:8px;box-shadow:var(--shadow);border-left:3px solid var(--indigo);font-size:12.5px}
.kcard .t{font-weight:600;margin-bottom:6px;line-height:1.35}
.kcard .m{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}

/* ── risk matrix ── */
.rmatrix{border-collapse:separate;border-spacing:4px}
.rmatrix td{width:78px;height:60px;border-radius:8px;vertical-align:top;padding:5px;position:relative;cursor:default}
.rmatrix .axl{background:transparent;font-size:11px;font-weight:700;color:var(--slate);width:auto;text-align:center}
.rmatrix .cnt{font-size:16px;font-weight:800;color:rgba(0,0,0,.55)}
.rmatrix .ax-y{writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-weight:700;color:var(--muted);font-size:11px}

/* ── scope map ── */
.scope{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.snode{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px;box-shadow:var(--shadow)}
.snode .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.snode .ty{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.snode .ct{font-size:22px;font-weight:800;margin-top:2px}

.donutwrap{display:flex;align-items:center;gap:18px}
.legend{font-size:12px}.legend div{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.legend .sw{width:11px;height:11px;border-radius:3px}
.empty{text-align:center;color:var(--muted);padding:34px;font-size:13px}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--indigo);border-radius:50%;animation:sp 1s linear infinite;margin:50px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.attn{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid #F0F2F8}
.attn:last-child{border:none}
.attn .ix{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.attn .info{flex:1;min-width:0}.attn .info .t{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attn .info .s{font-size:11.5px;color:var(--muted)}
.pill-own{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--slate);font-weight:600}
.av-sm{width:22px;height:22px;border-radius:50%;background:var(--bg2);color:var(--indigo);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}

/* drawer */
.drawer-ov{position:fixed;inset:0;background:rgba(20,30,60,.4);z-index:60;display:none}
.drawer-ov.open{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:92vw;background:#fff;z-index:61;box-shadow:-8px 0 30px rgba(20,30,60,.18);transform:translateX(100%);transition:transform .22s;overflow-y:auto}
.drawer.open{transform:none}
.drawer .dh{padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.drawer .dh h2{font-size:17px;font-weight:800}
.drawer .dh .x{position:absolute;top:16px;right:18px;background:none;border:none;font-size:24px;color:var(--muted);line-height:1}
.drawer .db{padding:20px 22px}
.field{margin-bottom:14px}.field .fl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:3px}
.field .fv{font-size:13.5px}
.pbar{display:inline-block;width:90px;height:7px;border-radius:5px;background:#EDF0F7;overflow:hidden;vertical-align:middle}
.pbar>i{display:block;height:100%;background:var(--green)}
.tag{display:inline-block;background:var(--bg2);color:var(--indigo);border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:600;margin:2px 4px 2px 0}
.btn{background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:8px 15px;font-size:13px;font-weight:700}
.btn.ghost{background:var(--bg2);color:var(--indigo)}
.flt{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.flt select,.flt input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;outline:none}
.trendwrap{position:relative}
</style>
</head>
<body>
<div id="login-screen"><div class="spin"></div></div>

<div id="app">
  <div class="topbar">
    <div class="brand"><svg class="sh" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg><b>Kinetic GRC</b> <span>Command Center</span></div>
    <div class="spacer"></div>
    <div class="tenant-pick" id="tenantPickWrap" style="display:none">
      <label>Client</label>
      <select id="tenantSel"></select>
    </div>
    <div class="who"><span class="av" id="userAv">?</span><span id="userName">…</span></div>
    <button class="lo" onclick="logout()">Sign out</button>
  </div>
  <div class="layout">
    <nav class="side" id="side"></nav>
    <main class="main" id="view"><div class="spin"></div></main>
  </div>
</div>

<div class="drawer-ov" id="drawerOv" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div class="dh"><h2 id="drTitle"></h2><button class="x" onclick="closeDrawer()">&times;</button></div><div class="db" id="drBody"></div></aside>

<script>
/* ════════════════════════ session + api ════════════════════════ */
let SESSION=null;
try{ SESSION=JSON.parse(sessionStorage.getItem('base_session')||'null'); }catch(e){}
if(!SESSION||!SESSION.auth){ location.replace('/'); }
const AUTH='Basic '+(SESSION&&SESSION.auth);
function logout(){ sessionStorage.removeItem('base_session'); localStorage.removeItem('base_session'); location.replace('/'); }

async function api(path){
  const r=await fetch('/api/grc'+path,{headers:{Authorization:AUTH}});
  if(!r.ok) throw new Error('API '+r.status+' '+path);
  return r.json();
}
async function kget(form,kql,limit=200){
  let url='/app/api/v1/kapps/grc/forms/'+form+'/submissions?include=values&limit=25';
  if(kql) url+='&q='+encodeURIComponent(kql);
  const out=[];let token=null,guard=0;
  do{ const u=url+(token?'&pageToken='+encodeURIComponent(token):'');
    const r=await fetch(u,{headers:{Authorization:AUTH}}); const d=await r.json();
    (d.submissions||[]).forEach(s=>out.push(s)); token=d.nextPageToken;
  }while(token&&out.length<limit&&++guard<12);
  return out;
}

/* ════════════════════════ helpers ════════════════════════ */
const $=(s,r=document)=>r.querySelector(s);
const el=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstElementChild;};
const esc=(s)=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=(n)=>(n||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const sevClass=(s)=>({Critical:'b-crit',High:'b-high',Medium:'b-med',Low:'b-low'}[s]||'b-gray');
const sevColor=(s)=>({Critical:'#C92A2A',High:'#E8590C',Medium:'#E8910C',Low:'#3BA55C'}[s]||'#8A93A6');
const healthClass=(h)=>({Green:'b-green',Yellow:'b-yellow',Red:'b-red'}[h]||'b-gray');
const readyColor=(p)=>p>=75?'#2F9E44':p>=50?'#E8910C':'#E03131';
function fmtDate(d){ if(!d)return '—'; const x=new Date(d); return isNaN(x)?d:x.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function daysTo(d){ if(!d)return null; return Math.round((new Date(d)-new Date('2026-06-30'))/86400000); }
function avatar(n){ return '<span class="av-sm">'+initials(n)+'</span>'; }

/* donut svg: segments [{label,value,color}] */
function donut(segs,size=120,thick=20,centerTop='',centerSub=''){
  const tot=segs.reduce((a,s)=>a+s.value,0)||1; const r=(size-thick)/2,c=size/2,circ=2*Math.PI*r; let off=0;
  let arcs=segs.filter(s=>s.value>0).map(s=>{const frac=s.value/tot;const dash=frac*circ;
    const seg='<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="'+thick+'" stroke-dasharray="'+dash+' '+(circ-dash)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+c+' '+c+')"/>';
    off+=dash;return seg;}).join('');
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#EDF0F7" stroke-width="'+thick+'"/>'+arcs+
    (centerTop?'<text x="'+c+'" y="'+(c-1)+'" text-anchor="middle" font-size="'+(size*.23)+'" font-weight="800" fill="#1A1F36">'+centerTop+'</text>':'')+
    (centerSub?'<text x="'+c+'" y="'+(c+size*.16)+'" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8A93A6">'+centerSub+'</text>':'')+'</svg>';
}
function gauge(pct,size=130){ const col=readyColor(pct);
  return donut([{value:pct,color:col},{value:100-pct,color:'#EDF0F7'}],size,16,pct+'%','READY'); }
function bars(items){ // [{nm,pc,color?}]
  return items.map(i=>'<div class="frow"><div class="nm" title="'+esc(i.nm)+'">'+esc(i.nm)+'</div><div class="bar"><i style="width:'+i.pc+'%;background:'+(i.color||readyColor(i.pc))+'"></i></div><div class="pc" style="color:'+(i.color||readyColor(i.pc))+'">'+i.pc+'%</div></div>').join('');
}
function sparkline(pts,w=260,h=64){ if(!pts.length)return ''; const max=Math.max(...pts.map(p=>p.readiness),100),min=Math.min(...pts.map(p=>p.readiness),0);
  const xs=(i)=>16+i*((w-26)/Math.max(1,pts.length-1)); const ys=(v)=>h-12-((v-min)/Math.max(1,max-min))*(h-24);
  const line=pts.map((p,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(p.readiness).toFixed(1)).join(' ');
  const area=line+' L'+xs(pts.length-1).toFixed(1)+' '+(h-12)+' L'+xs(0)+' '+(h-12)+' Z';
  const dots=pts.map((p,i)=>'<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(p.readiness).toFixed(1)+'" r="2.6" fill="#3B5BDB"/>').join('');
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><path d="'+area+'" fill="rgba(59,91,219,.10)"/><path d="'+line+'" fill="none" stroke="#3B5BDB" stroke-width="2.2"/>'+dots+'</svg>';
}
function heatColor(n,max){ if(!n)return '#EEF1F6'; const t=Math.min(1,n/Math.max(1,max));
  const a=[230,242,255],b=[201,42,42]; const c=a.map((v,i)=>Math.round(v+(b[i]-v)*t)); return 'rgb('+c.join(',')+')'; }

/* ════════════════════════ state + nav ════════════════════════ */
const STATE={ portfolio:null, tenant:null, tenantData:{}, owners:[], me:null };
const NAV=[
  {grp:'Provider'},
  {id:'portfolio',name:'Provider Portfolio',icon:'grid'},
  {id:'executive',name:'Executive Dashboard',icon:'trend'},
  {grp:'Client'},
  {id:'command',name:'Client Command Center',icon:'home'},
  {id:'framework',name:'Framework Readiness',icon:'layers'},
  {id:'scope',name:'Scope Map',icon:'map'},
  {id:'evidence',name:'Evidence',icon:'file'},
  {id:'gaps',name:'Gap Heatmap',icon:'flame'},
  {id:'remediation',name:'Remediation Kanban',icon:'check'},
  {id:'risk',name:'Risk Matrix',icon:'alert'},
  {id:'audit',name:'Audit Readiness',icon:'clipboard'},
  {grp:'Library & Work'},
  {id:'library',name:'Control Library',icon:'book'},
  {id:'mywork',name:'My Work Queue',icon:'inbox'},
];
const ICONS={
  grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',
  trend:'<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
  home:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  layers:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
  map:'<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  flame:'<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',
  check:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',

    <div class="cols c23">
      <div class="tbl-wrap"><div class="scroll"><table><thead><tr><th>Task</th><th>Client</th><th>Priority</th><th>Status</th><th>Due</th><th>%</th></tr></thead><tbody>
        ${w.tasks.map(t=>{const dt=daysTo(t.due);return '<tr><td><b>'+esc(t.title)+'</b></td><td>'+esc(t.tenant)+'</td><td><span class="badge '+sevClass(t.priority)+'">'+esc(t.priority)+'</span></td><td><span class="badge b-gray">'+esc(t.status)+'</span></td><td>'+(dt<0?'<span style="color:var(--red);font-weight:700">':'')+fmtDate(t.due)+(dt<0?' ⚠</span>':'')+'</td><td><span class="pbar"><i style="width:'+t.pct+'%"></i></span></td></tr>';}).join('')||'<tr><td colspan="6" class="empty">No open tasks 🎉</td></tr>'}
      </tbody></table></div></div>
      <div class="card"><h3>Evidence I Owe</h3><div class="ch-sub">requests & rejections</div>
        ${w.evidenceRequests.map(e=>'<div class="attn"><div class="info"><div class="t">'+esc(e.title)+'</div><div class="s">'+esc(e.tenant)+' · '+esc(e.status)+'</div></div></div>').join('')||'<div class="empty">Nothing requested</div>'}
        ${w.rejected.length?'<div class="grp" style="margin:14px 0 6px;color:var(--red)">Rejected — needs rework</div>'+w.rejected.map(e=>'<div class="attn"><div class="info"><div class="t">'+esc(e.title)+'</div><div class="s" style="color:var(--red)">'+esc(e.notes||'Resubmit')+'</div></div></div>').join(''):''}
      </div>
    </div>`;
  }
};

/* ════════════════════════ router ════════════════════════ */
async function route(){
  const hash=(location.hash||'#portfolio').slice(1);
  const view=VIEWS[hash]?hash:'portfolio';
  renderNav(view);
  // tenant selector only for client-scoped views
  const clientScoped=!['portfolio','library'].includes(view);
  $('#tenantPickWrap').style.display=clientScoped?'flex':'none';
  if(clientScoped&&STATE.portfolio) $('#tenantSel').value=STATE.tenant;
  const root=$('#view'); root.innerHTML='<div class="spin"></div>';
  try{ await VIEWS[view](root); }
  catch(e){ root.innerHTML='<div class="card"><div class="empty">⚠ '+esc(e.message)+'<br><br>The GRC kapp may not be installed/seeded yet, or indexes are still building.</div></div>'; console.error(e); }
}

/* ════════════════════════ boot ════════════════════════ */
async function boot(){
  // user identity
  try{ const me=await(await fetch('/app/api/v1/me',{headers:{Authorization:AUTH}})).json(); STATE.me=me.user||me; const nm=STATE.me.displayName||STATE.me.username||SESSION.user; $('#userName').textContent=nm; $('#userAv').textContent=initials(nm); }catch(e){ $('#userName').textContent=SESSION.user||'user'; $('#userAv').textContent=initials(SESSION.user); }
  try{
    STATE.portfolio=await api('/portfolio');
    if(STATE.portfolio.clients.length){ STATE.tenant=STATE.portfolio.clients[0].id; buildTenantSel(); $('#tenantPickWrap').style.display='flex'; }
  }catch(e){ console.error('portfolio load',e); }
  window.addEventListener('hashchange',route);
  if(!location.hash) location.hash='#portfolio';
  route();
}
// wait until the base injected-script reveals #app (kapp exists), else it shows install overlay
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
boot();
</script>
</body>
</html>
