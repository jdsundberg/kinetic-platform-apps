    const colLabel = colVal || 'No Value';
    const pc = colVal ? pillColor(colVal) : { bg: '#ECEFF1', fg: '#37474F' };

    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.dataset.col = colVal;
    col.innerHTML = `
      <div class="kanban-col-header" style="border-bottom-color:${pc.fg}; color:${pc.fg}">
        ${esc(colLabel)}
        <span class="kanban-count">${colRows.length}</span>
      </div>
      <div class="kanban-col-body">
        ${colRows.map(row => {
          const title = labelField ? v(row, labelField.name) : row.id.substring(0, 8);
          const subs = subFields.map(f => {
            const sv = v(row, f.name);
            return sv ? `<div class="card-sub">${esc(f.name)}: ${esc(sv)}</div>` : '';
          }).join('');
          let badge = '';
          if (badgeField) {
            const bv = v(row, badgeField.name);
            if (bv) {
              const bc = pillColor(bv);
              badge = `<span class="cell-pill" style="background:${bc.bg};color:${bc.fg};font-size:10px;margin-top:4px;display:inline-block;">${esc(bv)}</span>`;
            }
          }

          return `<div class="kanban-card" draggable="true" data-row-id="${escAttr(row.id)}" onclick="showRecordDetail('${escAttr(row.id)}')">
            <div class="card-title">${esc(title) || '&nbsp;'}</div>
            ${subs}${badge}
          </div>`;
        }).join('')}
      </div>
    `;

    // Drop handlers on column body
    const body = col.querySelector('.kanban-col-body');
    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', (e) => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    });
    col.addEventListener('drop', (e) => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const rowId = e.dataTransfer.getData('text/plain');
      if (rowId) kanbanMove(rowId, colVal);
    });

    container.appendChild(col);
  }

  // Drag start/end handlers on cards (delegated on container)
  container.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.kanban-card');
    if (!card) return;
    e.dataTransfer.setData('text/plain', card.dataset.rowId);
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => card.classList.add('dragging'));
  });
  container.addEventListener('dragend', (e) => {
    const card = e.target.closest('.kanban-card');
    if (card) card.classList.remove('dragging');
    container.querySelectorAll('.kanban-col.drag-over').forEach(c => c.classList.remove('drag-over'));
  });

  ga.appendChild(container);
}

async function kanbanMove(rowId, newVal) {
  if (newVal == null) return;
  // Check if value is actually changing
  const existing = rows.find(r => r.id === rowId);
  if (existing && v(existing, kanbanField) === newVal) return;
  try {
    await api(`/submissions/${rowId}`, {
      method: 'PUT',
      body: JSON.stringify({ values: { [kanbanField]: newVal } })
    });
    if (existing) {
      if (!existing.values) existing.values = {};
      existing.values[kanbanField] = newVal;
    }
    renderView();
    toast('Moved');
  } catch (e) {
    console.error('kanbanMove:', e);
    toast('Error moving card');
  }
}

/* ════════════════════════════════════════════════════
   GANTT VIEW
   ════════════════════════════════════════════════════ */

function renderGanttView() {
  const t = findTable();
  if (!t) return;

  const ga = document.getElementById('grid-area');
  ga.innerHTML = '';
  ga.appendChild(buildViewToolbar(t));

  // Sort rows by start date
  const sorted = [...rows].filter(r => v(r, ganttStartField)).sort((a, b) => {
    const da = v(a, ganttStartField) || '';
    const db = v(b, ganttStartField) || '';
    return da.localeCompare(db);
  });
  // Include rows with no start date at the end
  const noDate = rows.filter(r => !v(r, ganttStartField));

  // Determine date range from data
  let minDate, maxDate;
  const allDates = [];
  for (const row of rows) {
    const sd = v(row, ganttStartField);
    if (sd) allDates.push(sd.substring(0, 10));
    if (ganttEndField) {
      const ed = v(row, ganttEndField);
      if (ed) allDates.push(ed.substring(0, 10));
    }
  }
  if (allDates.length === 0) {
    // No dates — show a month around today
    const now = new Date();
    minDate = new Date(now.getFullYear(), now.getMonth(), 1);
    maxDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  } else {
    allDates.sort();
    minDate = parseLocalDate(allDates[0]);
    maxDate = parseLocalDate(allDates[allDates.length - 1]);
  }

  // Pad range: 7 days before first, 14 days after last
  minDate = new Date(minDate.getTime() - 7 * 86400000);
  maxDate = new Date(maxDate.getTime() + 14 * 86400000);

  // Build array of days in range
  const days = [];
  const d = new Date(minDate);
  while (d <= maxDate) {
    days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Find label field
  const labelField = t.fields.find(f => f.type === 'Text') || t.fields[0];
  // Find color field (first dropdown)
  const colorField = t.fields.find(f => f.type === 'Dropdown');

  // Group days by month for header
  const months = [];
  let curMonth = null;
  for (let i = 0; i < days.length; i++) {
    const key = `${days[i].getFullYear()}-${days[i].getMonth()}`;
    if (!curMonth || curMonth.key !== key) {
      curMonth = { key, label: `${monthNames[days[i].getMonth()]} ${days[i].getFullYear()}`, span: 0 };
      months.push(curMonth);
    }
    curMonth.span++;
  }

  // Build table
  const wrapper = document.createElement('div');
  wrapper.className = 'gantt-wrapper';

  let html = '<table class="gantt-table"><thead>';
  // Month row
  html += '<tr class="gantt-header-row"><th class="gantt-label-hdr"></th>';
  for (const m of months) {
    html += `<th class="gantt-month" colspan="${m.span}">${esc(m.label)}</th>`;
  }
  html += '</tr>';
  // Day numbers row
  html += '<tr class="gantt-header-row"><th class="gantt-label-hdr">Record</th>';
  for (const day of days) {
    const dow = day.getDay();
    const ds = dayStr(day);
    const isWeekend = dow === 0 || dow === 6;
    const isToday = ds === todayStr;
    html += `<th class="gantt-day${isWeekend ? ' weekend' : ''}${isToday ? ' today-col' : ''}">${day.getDate()}</th>`;
  }
  html += '</tr></thead><tbody>';

  // Data rows
  const allRows = [...sorted, ...noDate];
  for (const row of allRows) {
    const label = labelField ? v(row, labelField.name) : row.id.substring(0, 8);
    html += `<tr>`;
    html += `<td class="gantt-label-cell" onclick="showRecordDetail('${escAttr(row.id)}')" title="${escAttr(label)}">${esc(label) || '&mdash;'}</td>`;

    const startVal = v(row, ganttStartField);
    const endVal = ganttEndField ? v(row, ganttEndField) : '';
    const startDs = startVal ? startVal.substring(0, 10) : '';
    const endDs = endVal ? endVal.substring(0, 10) : '';

    // Find start/end column indexes
    const startIdx = startDs ? days.findIndex(d => dayStr(d) === startDs) : -1;
    const endIdx = endDs ? days.findIndex(d => dayStr(d) === endDs) : -1;

    // Pick bar color
    let barColor = 'var(--green)';
    if (colorField) {
      const cv = v(row, colorField.name);
      if (cv) barColor = pillColor(cv).fg;
    }

    for (let i = 0; i < days.length; i++) {
      const dow = days[i].getDay();
      const ds = dayStr(days[i]);
      const isWeekend = dow === 0 || dow === 6;
      const isToday = ds === todayStr;
      let cls = 'gantt-day' + (isWeekend ? ' weekend' : '') + (isToday ? ' today-col' : '');
      html += `<td class="${cls}" style="position:relative;">`;

      // Render bar starting at startIdx
      if (i === startIdx) {
        if (endIdx > startIdx) {
          // Duration bar spanning multiple cells
          const span = endIdx - startIdx + 1;
          const widthPx = span * 28 - 4; // 28px per cell minus padding
          html += `<div class="gantt-bar" style="background:${barColor}; width:${widthPx}px;" onclick="event.stopPropagation(); showRecordDetail('${escAttr(row.id)}')" title="${escAttr(label)}: ${esc(startDs)} → ${esc(endDs)}">${esc(label)}</div>`;
        } else {
          // Single-day milestone (no end date or same day)
          html += `<div class="gantt-milestone" style="background:${barColor}; left:6px;" onclick="event.stopPropagation(); showRecordDetail('${escAttr(row.id)}')" title="${escAttr(label)}: ${esc(startDs)}"></div>`;
        }
      }

      // Today marker
      if (isToday) {
        html += '<div class="gantt-today-line" style="left:14px;"></div>';
      }
      html += '</td>';
    }
    html += '</tr>';
  }

  html += '</tbody></table>';
  wrapper.innerHTML = html;
  ga.appendChild(wrapper);
}

function parseLocalDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function dayStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ════════════════════════════════════════════════════

function showRecordDetail(rowId) {
  event.stopPropagation();
  const t = findTable();
  if (!t) return;
  const row = rows.find(r => r.id === rowId);
  if (!row) return;

  let html = '<h3>Record Detail</h3>';
  for (const f of t.fields) {
    const val = v(row, f.name);
    html += `<label>${esc(f.name)}</label>`;
    if (f.type === 'Checkbox') {
      html += `<div style="margin-top:4px;"><input type="checkbox" class="detail-field" data-field="${escAttr(f.name)}" data-type="Checkbox" ${val === 'true' ? 'checked' : ''}></div>`;
    } else if (f.type === 'Dropdown') {
      html += `<select class="detail-field" data-field="${escAttr(f.name)}" data-type="Dropdown">
        <option value="">—</option>
        ${(f.choices || []).map(c => `<option value="${escAttr(c)}" ${c === val ? 'selected' : ''}>${esc(c)}</option>`).join('')}
      </select>`;
    } else if (f.type === 'Date') {
      html += `<input type="date" class="detail-field" data-field="${escAttr(f.name)}" data-type="Date" value="${escAttr(val)}">`;
    } else if (f.type === 'Long Text') {
      html += `<textarea class="detail-field" data-field="${escAttr(f.name)}" data-type="Long Text" rows="3">${esc(val)}</textarea>`;
    } else {
      html += `<input type="text" class="detail-field" data-field="${escAttr(f.name)}" data-type="Text" value="${escAttr(val)}">`;
    }
  }
  html += `
    <div class="modal-actions">
      <button class="btn-danger" onclick="confirmDeleteRecord('${escAttr(rowId)}')">Delete</button>
      <div class="spacer" style="flex:1"></div>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveRecordDetail('${escAttr(rowId)}')">Save</button>
    </div>
  `;
  showModal(html);
}

async function saveRecordDetail(rowId) {
  const fields = document.querySelectorAll('.detail-field');
  const values = {};
  for (const el of fields) {
    const name = el.dataset.field;
    const type = el.dataset.type;
    if (type === 'Checkbox') {
      values[name] = el.checked ? 'true' : 'false';
    } else {
      values[name] = el.value;
    }
  }

  closeModal();
  try {
    await api(`/submissions/${rowId}`, {
      method: 'PUT',
      body: JSON.stringify({ values })
    });
    // Update local state
    const row = rows.find(r => r.id === rowId);
    if (row) {
      if (!row.values) row.values = {};
      Object.assign(row.values, values);
    }
    renderView();
    toast('Record saved');
  } catch (e) {
    console.error('saveRecordDetail:', e);
    toast('Error saving record');
  }
}

async function confirmDeleteRecord(rowId) {
  closeModal();
  showModal(`
    <h3>Delete Record</h3>
    <p style="margin-top:8px;font-size:14px;">Are you sure you want to delete this record?</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" onclick="doDeleteRecord('${escAttr(rowId)}')">Delete</button>
    </div>
  `);
}

async function doDeleteRecord(rowId) {
  closeModal();
  try {
    await api(`/submissions/${rowId}`, { method: 'DELETE' });
    toast('Record deleted');
    await loadRows();
  } catch (e) {
    console.error('doDeleteRecord:', e);
    toast('Error deleting record');
  }
}

function purgeTable(slug) {
  const t = findTable(slug);
  if (!t) return;
  const warn = isVirtual(slug) ? '<br><span style="color:var(--orange);font-size:12px;font-weight:600;">Warning: This will delete real records from the source form!</span>' : '';
  showModal(`
    <h3>Purge Records</h3>
    <p style="margin-top:8px;font-size:14px;">Delete <strong>all records</strong> from <strong>${esc(t.name)}</strong>?<br>
    <span style="color:var(--red);font-size:12px;">This cannot be undone. The table structure (columns) will be kept.</span>${warn}</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmPurge('${esc(slug)}')">Purge All</button>
    </div>
  `);
}

async function confirmPurge(slug) {
  closeModal();
  toast('Purging records...');
  let deleted = 0;
  try {
    // Re-fetch page 1 and delete in batches until empty
    for (let pass = 0; pass < 100; pass++) { // safety limit
      let url = `/kapps/${activeKapp()}/forms/${slug}/submissions?limit=25&include=values`;
      const data = await api(url);
      const subs = data.submissions || [];
      if (subs.length === 0) break;

      // Delete in batches of 10
      for (let i = 0; i < subs.length; i += 10) {
        const batch = subs.slice(i, i + 10);
        await Promise.all(batch.map(s => api(`/submissions/${s.id}`, { method: 'DELETE' })));
        deleted += batch.length;
      }
    }
    toast(`Purged ${deleted} record${deleted !== 1 ? 's' : ''}`);
    if (activeTable === slug) {
      currentPage = 0;
      pageKeys = [null];
      hasNextPage = false;
      selectedRows.clear();
      await loadRows();
    }
  } catch (e) {
    console.error('purge:', e);
    toast(`Purged ${deleted} — error: ${e.message}`);
    if (activeTable === slug) await loadRows();
  }
}

/* ── Mock Data Generator ── */
const MOCK_FIRST = ['James','Mary','John','Patricia','Robert','Jennifer','Michael','Linda','David','Elizabeth',
  'William','Barbara','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Charles','Karen',
  'Daniel','Lisa','Matthew','Nancy','Anthony','Betty'];
const MOCK_LAST = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez',
  'Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin',
  'Lee','Perez','Thompson','White','Harris','Clark'];
const MOCK_COMPANY = ['Acme Corp','Globex','Initech','Umbrella Inc','Soylent','Cyberdyne','Stark Industries',
  'Wayne Enterprises','Wonka Industries','Tyrell Corp','Nakatomi Trading','Oscorp','Massive Dynamic'];
const MOCK_CITY = ['New York','Los Angeles','Chicago','Houston','Phoenix','Philadelphia','San Antonio',
  'San Diego','Dallas','Austin','Portland','Denver','Seattle','Boston','Miami'];
const MOCK_WORDS = ['alpha','beta','gamma','delta','epsilon','core','prime','nova','apex','nexus',
  'quantum','fusion','matrix','pulse','orbit','zenith','vertex','cipher','titan','echo'];
const MOCK_LOREM = ['Lorem ipsum dolor sit amet','Consectetur adipiscing elit','Sed do eiusmod tempor',
  'Ut enim ad minim veniam','Quis nostrud exercitation','Duis aute irure dolor','Excepteur sint occaecat',
  'Nemo enim ipsam voluptatem','Neque porro quisquam est','Ut aliquip ex ea commodo'];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randDate(startYear, endYear) {
  const y = randInt(startYear, endYear);
  const m = randInt(1, 12);
  const d = randInt(1, 28);
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// Generate a value for a known pattern regex
function mockForPattern(pattern) {
  const p = pattern.replace(/^\^/, '').replace(/\$$/, ''); // strip anchors for matching
  // Email
  if (p.includes('[\\w.+-]+@')) return pick(MOCK_FIRST).toLowerCase() + '.' + pick(MOCK_LAST).toLowerCase() + '@example.com';
  // Phone US — (555) 123-4567
  if (p.includes('\\d{3}') && p.includes('\\d{4}')) return `(${randInt(200,999)}) ${randInt(200,999)}-${randInt(1000,9999)}`;
  // URL
  if (p.includes('https?://')) return 'https://www.' + pick(MOCK_WORDS) + '.com/' + pick(MOCK_WORDS);
  // ZIP code
  if (p === '\\d{5}(-\\d{4})?' || p.includes('\\d{5}')) return String(randInt(10000, 99999));
  // IP address
  if (p.includes('\\d{1,3}\\.\\d{1,3}')) return `${randInt(10,192)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(1,254)}`;
  // SSN
  if (p.includes('\\d{3}-\\d{2}-\\d{4}')) return `${randInt(100,999)}-${randInt(10,99)}-${randInt(1000,9999)}`;
  // Hex color
  if (p.includes('[0-9A-Fa-f]{6}')) return '#' + Array.from({length:6}, () => '0123456789ABCDEF'[randInt(0,15)]).join('');
  // Slug
  if (p.includes('[a-z0-9]+(-[a-z0-9]+)')) return pick(MOCK_WORDS) + '-' + pick(MOCK_WORDS) + '-' + randInt(1,99);
  // UUID
  if (p.includes('[0-9a-f]{8}-')) {
    const h = (n) => Array.from({length:n}, () => '0123456789abcdef'[randInt(0,15)]).join('');
    return `${h(8)}-${h(4)}-${h(4)}-${h(4)}-${h(12)}`;
  }
  // Pure digits ^\d{N}$ — e.g. year, ID number
  const digitsMatch = p.match(/^\\d\{(\d+)\}$/);
  if (digitsMatch) {
    const len = parseInt(digitsMatch[1]);
    if (len === 4) return String(randInt(1960, 2010)); // likely a year
    const min = Math.pow(10, len - 1);
    const max = Math.pow(10, len) - 1;
    return String(randInt(min, max));
  }
  // Digits range ^\d{M,N}$
  const digitsRange = p.match(/^\\d\{(\d+),(\d+)\}$/);
  if (digitsRange) {
    const len = randInt(parseInt(digitsRange[1]), parseInt(digitsRange[2]));
    const min = Math.pow(10, len - 1);
    const max = Math.pow(10, len) - 1;
    return String(randInt(min, max));
  }
  return null; // unknown pattern
}

function mockValue(field) {
  const name = field.name.toLowerCase();
  const pattern = field.pattern || '';

  // Dropdown — pick a random choice
  if (field.type === 'Dropdown' && field.choices && field.choices.length > 0) {
    return pick(field.choices);
  }
  // Checkbox
  if (field.type === 'Checkbox') {
    return Math.random() > 0.5 ? 'true' : 'false';
  }
  // Date
  if (field.type === 'Date') {
    if (name.includes('expir') || name.includes('end') || name.includes('target') || name.includes('due') || name.includes('warranty') || name.includes('close')) {
      return randDate(2026, 2028);
    }
    if (name.includes('start') || name.includes('purchase') || name.includes('hire') || name.includes('created') || name.includes('resolved')) {
      return randDate(2023, 2026);
    }
    return randDate(2024, 2027);
  }
  // Long Text
  if (field.type === 'Long Text') {
    const count = randInt(2, 4);
    return Array.from({length: count}, () => pick(MOCK_LOREM)).join('. ') + '.';
  }

  // If field has a pattern, generate matching data first
  if (pattern) {
    const patternVal = mockForPattern(pattern);
    if (patternVal) return patternVal;
    // Pattern exists but we don't recognize it — still try name heuristic below,
    // then validate at the end
  }

  // Text — heuristic on field name for realistic data
  let val = mockByName(name);

  // Validate against pattern; if it fails, try pattern generator or leave empty
  if (pattern && val) {
    try {
      const re = new RegExp(pattern);
      if (!re.test(val)) {
        const patternVal = mockForPattern(pattern);
        return patternVal || '';
      }
    } catch {}
  }

  return val;
}

function mockByName(name) {
  if (name.includes('first name') || name === 'first') return pick(MOCK_FIRST);
  if (name.includes('last name') || name === 'last') return pick(MOCK_LAST);
  if (name.includes('name') && (name.includes('vendor') || name.includes('company') || name.includes('org'))) return pick(MOCK_COMPANY);
  if (name.includes('name') && (name.includes('project') || name.includes('asset') || name.includes('task'))) {
    return pick(['Project','Initiative','Campaign','Phase','Sprint']) + ' ' + pick(MOCK_WORDS).charAt(0).toUpperCase() + pick(MOCK_WORDS).slice(1);
  }
  if (name === 'name' || name.includes('full name') || name.includes('respondent') || name.includes('contact name')) {
    return pick(MOCK_FIRST) + ' ' + pick(MOCK_LAST);
  }
  if (name.includes('email') || name.includes('e-mail')) {
    return pick(MOCK_FIRST).toLowerCase() + '.' + pick(MOCK_LAST).toLowerCase() + '@' + pick(['example.com','test.org','company.net','acme.io']);
  }
  if (name.includes('phone')) {
    return `(${randInt(200,999)}) ${randInt(200,999)}-${randInt(1000,9999)}`;
  }
  if (name.includes('address')) return `${randInt(100,9999)} ${pick(['Main','Oak','Pine','Elm','Cedar','Maple'])} ${pick(['St','Ave','Blvd','Dr','Ln'])}`;
  if (name.includes('city')) return pick(MOCK_CITY);
  if (name.includes('state')) return pick(['CA','TX','NY','FL','IL','PA','OH','GA','NC','MI','WA','AZ','MA','CO','OR']);
  if (name.includes('country')) return pick(['United States','Canada','United Kingdom','Australia','Germany']);
  if (name.includes('zip') || name.includes('postal')) return String(randInt(10000, 99999));
  if (name.includes('title') || name.includes('subject') || name.includes('case title') || name.includes('request title') || name.includes('change title')) {
    return pick(['Update','Fix','Review','Implement','Configure','Deploy','Migrate','Investigate','Optimize','Upgrade']) + ' ' +
           pick(MOCK_WORDS) + ' ' + pick(['module','service','system','component','integration','process','workflow','feature']);
  }
  if (name.includes('job title') || name.includes('role')) {
    return pick(['Senior','Lead','Staff','Principal','Junior']) + ' ' + pick(['Engineer','Analyst','Manager','Designer','Developer','Consultant','Architect']);
  }
  if (name.includes('tag') || name.includes('asset tag')) return 'AT-' + randInt(10000, 99999);
  if (name.includes('serial')) return 'SN-' + Array.from({length:8}, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[randInt(0,35)]).join('');
  if (name.includes('contract') && name.includes('number')) return 'CTR-' + randInt(1000, 9999);
  if (name.includes('employee id') || name.includes('emp id')) return 'EMP-' + randInt(1000, 9999);
  if (name.includes('budget')) return '$' + randInt(10, 500) + ',000';
  if (name.includes('effort')) return pick(['2h','4h','1d','2d','3d','1w','2w']);
  if (name.includes('keyword')) return Array.from({length: randInt(2,4)}, () => pick(MOCK_WORDS)).join(', ');
  if (name.includes('key')) return pick(MOCK_WORDS).toUpperCase() + '_' + pick(MOCK_WORDS).toUpperCase();
  if (name.includes('value') || name.includes('display order')) return String(randInt(1, 100));
  if (name.includes('location') || name.includes('site')) return pick(MOCK_CITY) + ' ' + pick(['HQ','Office','Branch','Site','Campus','Lab']);
  if (name.includes('manufacturer') || name.includes('make')) return pick(['Dell','HP','Lenovo','Apple','Cisco','Samsung','Microsoft','Asus']);
  if (name.includes('model')) return pick(['Pro','Elite','ThinkPad','Latitude','Precision','Surface','MacBook']) + ' ' + randInt(100,9999);
  if (name.includes('manager') || name.includes('lead') || name.includes('assigned') || name.includes('reported') || name.includes('requested') || name.includes('approver') || name.includes('author')) {
    return pick(MOCK_FIRST) + ' ' + pick(MOCK_LAST);
  }
  if (name.includes('impact') || name.includes('risk')) return pick(['High','Medium','Low']);
  if (name.includes('year') || name.includes('birth')) return String(randInt(1960, 2010));
  if (name.includes('age')) return String(randInt(18, 75));
  if (name.includes('score') || name.includes('rating') || name.includes('grade')) return String(randInt(1, 100));
  if (name.includes('count') || name.includes('quantity') || name.includes('qty') || name.includes('number') || name.includes('num') || name.includes('#')) return String(randInt(1, 500));
  if (name.includes('percent') || name.includes('%')) return String(randInt(0, 100)) + '%';
  if (name.includes('url') || name.includes('website') || name.includes('link')) return 'https://www.' + pick(MOCK_WORDS) + '.com';
  if (name.includes('position')) return pick(['Point Guard','Shooting Guard','Small Forward','Power Forward','Center','Quarterback','Pitcher','Midfielder','Goalie','Striker']);
  // Fallback
  return pick(MOCK_WORDS).charAt(0).toUpperCase() + pick(MOCK_WORDS).slice(1) + ' ' + randInt(1, 999);
}

function generateMockData(slug) {
  const t = findTable(slug);
  if (!t) return;
  if (t.fields.length === 0) {
    toast('Add columns first');
    return;
  }
  showModal(`
    <h3>Generate Mock Data</h3>
    <p style="margin-top:8px;font-size:14px;">Create <strong>25 sample rows</strong> for <strong>${esc(t.name)}</strong> with realistic random data?</p>
    <p style="font-size:12px;color:var(--gray);margin-top:8px;">${t.fields.length} columns: ${t.fields.map(f => esc(f.name)).join(', ')}</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="confirmGenerateMock('${esc(slug)}')">Generate 25 Rows</button>
    </div>
  `);
}

async function confirmGenerateMock(slug) {
  closeModal();
  const t = findTable(slug);
  if (!t || t.fields.length === 0) return;

  toast('Generating mock data...');
  let created = 0;
  try {
    // Build 25 rows of mock values
    const mockRows = [];
    for (let i = 0; i < 25; i++) {
      const vals = {};
      for (const f of t.fields) {
        vals[f.name] = mockValue(f);
      }
      mockRows.push(vals);
    }

    // Create in batches of 5 concurrent
    for (let i = 0; i < mockRows.length; i += 5) {
      const batch = mockRows.slice(i, i + 5);
      await Promise.all(batch.map(vals =>
        api(`/kapps/${activeKapp()}/forms/${slug}/submissions`, {
          method: 'POST',
          body: JSON.stringify({ values: vals, coreState: 'Submitted' })
        })
      ));
      created += batch.length;
    }

    toast(`Created ${created} mock rows`);
    if (activeTable === slug) {
      currentPage = 0;
      pageKeys = [null];
      hasNextPage = false;
      await loadRows();
    }
  } catch (e) {
    console.error('generateMock:', e);
    toast(`Created ${created} — error: ${e.message}`);
    if (activeTable === slug) await loadRows();
  }
}

/* ════════════════════════════════════════════════════
   VIRTUAL TABLES
   ════════════════════════════════════════════════════ */

function saveVirtualTables() {
  const data = virtualTables.map(vt => ({ slug: vt.slug, name: vt.name, kappSlug: vt.kappSlug, kappName: vt.kappName }));
  localStorage.setItem('kinetic_air_vtables', JSON.stringify(data));
}

function loadVirtualTables() {
  try {
    const raw = localStorage.getItem('kinetic_air_vtables');
    if (raw) virtualTables = JSON.parse(raw).map(vt => ({ ...vt, fields: [] }));
  } catch { virtualTables = []; }
}

async function startVirtualTableFlow() {
  showModal(`
    <h3>Add Virtual Table</h3>
    <p style="font-size:12px;color:var(--gray);margin-bottom:8px;">Select a kapp to browse its forms.</p>
    <div class="kapp-list"><div style="padding:20px;text-align:center;color:var(--gray);">Loading kapps...</div></div>
  `);
  try {
    const data = await api('/kapps');
    const kapps = (data.kapps || []).filter(k => k.slug !== KAPP);
    if (kapps.length === 0) {
      showModal(`<h3>Add Virtual Table</h3><p style="margin-top:8px;">No other kapps found on this space.</p>
        <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Close</button></div>`);
      return;
    }
    showModal(`
      <h3>Add Virtual Table</h3>
      <p style="font-size:12px;color:var(--gray);margin-bottom:8px;">Select a kapp to browse its forms.</p>
      <div class="kapp-list">
        ${kapps.map(k => `
          <div class="kapp-item" onclick="pickVirtualKapp('${escAttr(k.slug)}', '${escAttr(k.name)}')">
            <div style="font-weight:600;">${esc(k.name)}</div>
            <div class="kapp-slug">${esc(k.slug)}</div>
          </div>
        `).join('')}
      </div>
      <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button></div>
    `);
  } catch (e) {
    console.error('startVirtualTableFlow:', e);
    toast('Error loading kapps');
    closeModal();
  }
}

async function pickVirtualKapp(kappSlug, kappName) {
  showModal(`
    <h3>Add Virtual Table</h3>
    <p style="font-size:12px;color:var(--gray);margin-bottom:8px;">Select a form from <strong>${esc(kappName)}</strong>.</p>
    <div class="form-list"><div style="padding:20px;text-align:center;color:var(--gray);">Loading forms...</div></div>
  `);
  try {
    const data = await api(`/kapps/${kappSlug}/forms`);
    const forms = data.forms || [];
    if (forms.length === 0) {
      showModal(`<h3>Add Virtual Table</h3><p style="margin-top:8px;">No forms in <strong>${esc(kappName)}</strong>.</p>
        <div class="modal-actions"><button class="btn-cancel" onclick="startVirtualTableFlow()">&#x2190; Back</button></div>`);
      return;
    }
    showModal(`
      <h3>Add Virtual Table</h3>
      <p style="font-size:12px;color:var(--gray);margin-bottom:8px;">Select a form from <strong>${esc(kappName)}</strong>.</p>
      <div class="form-list">
        ${forms.map(f => `
          <div class="form-item" onclick="addVirtualTable('${escAttr(kappSlug)}', '${escAttr(kappName)}', '${escAttr(f.slug)}', '${escAttr(f.name)}')">
            <div style="font-weight:600;">${esc(f.name)}</div>
            <div class="form-slug">${esc(f.slug)}</div>
          </div>
        `).join('')}
      </div>
      <div class="modal-actions"><button class="btn-cancel" onclick="startVirtualTableFlow()">&#x2190; Back</button></div>
    `);
  } catch (e) {
    console.error('pickVirtualKapp:', e);
    toast('Error loading forms');
    closeModal();
  }
}

function addVirtualTable(kappSlug, kappName, formSlug, formName) {
  // Check for duplicate
  if (virtualTables.some(vt => vt.slug === formSlug && vt.kappSlug === kappSlug)) {
    toast('This form is already added');
    closeModal();
    selectVirtualTable(formSlug);
    return;
  }
  virtualTables.push({ slug: formSlug, name: formName, kappSlug, kappName, fields: [] });
  saveVirtualTables();
  closeModal();
  toast(`Virtual table "${formName}" added`);
  selectVirtualTable(formSlug);
}

async function selectVirtualTable(slug) {
  const vt = virtualTables.find(t => t.slug === slug);
  if (!vt) return;
  activeKappOverride = vt.kappSlug;
  activeTable = slug;
  selectedRows.clear();
  currentPage = 0;
  pageKeys = [null];
  hasNextPage = false;
  renderSidebar();

  // Load form details from the source kapp
  try {
    const data = await api(`/kapps/${vt.kappSlug}/forms/${slug}?include=details,attributes,pages`);
    const form = data.form;
    if (form) {
      vt.fields = extractFields(form);
    }
  } catch (e) {
    console.error('selectVirtualTable loadForm:', e);
  }
  await loadRows();
}

function showVirtualTableMenu(event, slug) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = `
    <div class="ctx-item" onclick="hideCtxMenu(); renameVirtualTable('${esc(slug)}')">Rename (local)</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="hideCtxMenu(); generateMockData('${esc(slug)}')">Generate Mock Data</div>
    <div class="ctx-item danger" onclick="hideCtxMenu(); purgeTable('${esc(slug)}')">Purge Records</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="hideCtxMenu(); removeVirtualTable('${esc(slug)}')">Remove Virtual Table</div>
  `;
  positionMenu(menu, event);
}

function renameVirtualTable(slug) {
  const vt = virtualTables.find(t => t.slug === slug);
  if (!vt) return;
  showModal(`
    <h3>Rename Virtual Table</h3>
    <label>Display Name</label>
    <input id="vtable-rename" type="text" value="${escAttr(vt.name)}">
    <p style="font-size:11px;color:var(--gray);margin-top:6px;">This only changes the local display name. The source form is not modified.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="confirmRenameVirtualTable('${esc(slug)}')">Rename</button>
    </div>
  `);
  setTimeout(() => { const el = document.getElementById('vtable-rename'); el?.focus(); el?.select(); }, 100);
}

function confirmRenameVirtualTable(slug) {
  const name = document.getElementById('vtable-rename').value.trim();
  if (!name) return;
  const vt = virtualTables.find(t => t.slug === slug);
  if (vt) { vt.name = name; saveVirtualTables(); }
  closeModal();
  renderSidebar();
  if (activeTable === slug) renderToolbar();
  toast('Virtual table renamed');
}

function removeVirtualTable(slug) {
  const vt = virtualTables.find(t => t.slug === slug);
  if (!vt) return;
  showModal(`
    <h3>Remove Virtual Table</h3>
    <p style="margin-top:8px;font-size:14px;">Remove <strong>${esc(vt.name)}</strong> from your sidebar?<br>
    <span style="font-size:12px;color:var(--gray);">The source form in <strong>${esc(vt.kappName)}</strong> will not be affected.</span></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmRemoveVirtualTable('${esc(slug)}')">Remove</button>
    </div>
  `);
}

function confirmRemoveVirtualTable(slug) {
  virtualTables = virtualTables.filter(t => t.slug !== slug);
  saveVirtualTables();
  closeModal();
  toast('Virtual table removed');
  if (activeTable === slug) { activeTable = null; activeKappOverride = null; showEmpty(); }
  renderSidebar();
}

/* ════════════════════════════════════════════════════
   PAGINATION
   ════════════════════════════════════════════════════ */

function nextPage() {
  if (hasNextPage) {
    currentPage++;
    loadRows();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    loadRows();
  }
}

function refreshGrid() {
  if (activeTable) {
    currentPage = 0;
    pageKeys = [null];
    hasNextPage = false;
    selectedRows.clear();
    loadRows();
  }
}

/* ════════════════════════════════════════════════════
   CONTEXT MENUS
   ════════════════════════════════════════════════════ */

function showTableMenu(event, slug) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = `
    <div class="ctx-item" onclick="hideCtxMenu(); renameTable('${esc(slug)}')">Rename</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="hideCtxMenu(); generateMockData('${esc(slug)}')">Generate Mock Data</div>
    <div class="ctx-item danger" onclick="hideCtxMenu(); purgeTable('${esc(slug)}')">Purge Records</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="hideCtxMenu(); deleteTable('${esc(slug)}')">Delete Table</div>
  `;
  positionMenu(menu, event);
}

function showColMenu(event, fieldName) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = `
    <div class="ctx-item" onclick="hideCtxMenu(); editColumn('${escAttr(fieldName)}')">Edit Column</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="hideCtxMenu(); deleteColumn('${escAttr(fieldName)}')">Delete Column</div>
  `;
  positionMenu(menu, event);
}

function positionMenu(menu, event) {
  menu.style.display = 'block';
  menu.style.left = Math.min(event.clientX, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(event.clientY, window.innerHeight - 120) + 'px';
  event.stopPropagation();
  setTimeout(() => {
    document.addEventListener('click', hideCtxMenu, { once: true });
  }, 0);
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

/* ════════════════════════════════════════════════════
   MODAL
   ════════════════════════════════════════════════════ */

function showModal(html) {
  const modal = document.getElementById('modal');
  document.getElementById('modal-card').innerHTML = html;
  modal.classList.add('show');
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

/* ════════════════════════════════════════════════════
   GLOBAL CLICK HANDLER
   ════════════════════════════════════════════════════ */
document.addEventListener('click', () => {
  const menu = document.getElementById('ctx-menu');
  if (menu.style.display === 'block') menu.style.display = 'none';
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    hideCtxMenu();
  }
});
</script>
